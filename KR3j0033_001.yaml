body:
  text: 猗覺寮雜記卷上宋朱翌撰杜牧之云南軍不袒左邉𬒮四老安劉是滅劉其意以為四老輔立太子為非何不思之甚也惠帝嫡且長為太子無過即位之後能守髙祖規模亦可謂賢矣安能料其身後漢有吕氏之禍也哉使惠帝不可立張良决不肯從吕后之請又豈肯起四老人哉南軍不袒左袂意謂周勃入北軍時設有不袒者奈何此兒童之見也勃所慮者不得入北軍耳既入則無事矣勃之設問必已得北軍之情萬一不左袒必有後段豈若世之庸人無思慮者牧之可毋慮也又元微之四皓云秦皇轉無道諫者鼎鑊親茅焦脫衣諌先生無一言趙髙殺二世先生如不聞劉項取天下先生卧白雲海內八年戰先生全一身如何一朝起屈作儲二賔安存孝惠帝摧頽戚夫人捨大以誅細蛇盤而蠖伸惠帝竟不嗣吕氏禍有因與牧之意同微之責人太深過於牧之惠帝為太子無過豈可勸立戚夫人之子如意哉樂天答云先生道甚明夫子猶或非微之豈不慙耶晋桓𤣥作四皓論示殷仲堪亦微之意仲堪闢之其言極有理杜云自在嬌鶯恰恰啼說詩者謂恰恰鶯聲也廣韻云恰恰用心啼耳非其聲也陳無己平生尊黃魯直末年乃云向來一瓣香敬為曽南豐人或疑之不知曽子固出歐公之門後山受業南豐此詩乃頴州教授時觀六一堂圖書作為南豐先生燒香宜哉筆談云王維畫入神不拘四時如雪中芭蕉故惠洪云雪裏芭蕉失寒暑皆以芭蕉非雪中物嶺外如曲江冬大雪芭蕉自若紅蕉方開花始知前輩雖畫史亦不茍洪作詩時未到嶺外存中亦未知也子美槐葉冷淘云君王納晚涼此味亦時須事見大官令夏供槐葉冷淘出唐六典世謂燕子秋分即去之海上海上有燕子國如小說所謂烏衣國者是大不然往往入於深岩穴枯木中向寒不復出泥塗其身毛羽皆脫至春暖即生羽飛去晋郤鍳為兗州刺史掘野鼠蟄燕食之終無叛者此可見矣元微之云有鳥有鳥名燕子口中未省無泥滓春風吹送廊廡間秋社吹將嵌孔裏亦其據也退之憶昨行驛馬拒地驅頻隤蜀人謂立地為拒地立地者不容少休之意永貞行皆順宗時伾文事其言元臣故老不敢語晝卧涕泣何汍瀾謂髙郢鄭珣瑜杜佑輩郎官清要為世稱荒郡迫野嗟可矜謂栁子厚謫永州退之云長安富豪兒盤饌羅羶葷不解文字飲惟能醉紅裙雖然一餉樂有如聚飛蚊楞嚴經云一切衆生如一器中聚百蚊蚋啾啾飛鳴於方寸中鼓發狂閙退之雖闢佛然亦觀其書唐新史以退之自監察御史極論宫市德宗怒貶陽山令皇甫湜為退之神道碑云貞元十九年關中旱饑人死相枕藉吏刻取息先生列言天下根本民急如是請寬民徭免田租之弊專政者惡之斥為陽山令退之赴江陵途中詩云是年京師旱田畝少所收云云傳聞閭里間赤子弃渠溝持男易斗粟掉頭莫肯酬我時出衢路餓者何其稠云云適余除御史誠當得言秋拜疏移閣門為忠寧自謀又云僶俯不回顧行行詣連州則因論旱貶陽山無疑不知史何據而云論宫市魯直與髙子勉云尊前八米句忩下十年書徐師州與潘邠老云字直千金師智永句稱八米繼盧即齊文宣崩文士各作挽詩十首擇其善者用之每人不過一二首惟盧思道獨得八首時人稱為八采盧即米字蓋采字之誤也十首中采擇八首耳若作米無義理詩人不之考相襲以為八米蓋言精鑿失之甚矣元微之酬樂天云八采詩成未伏盧可證采字為是琴曲有賀若最古淡東坡云琴裏若能知賀若詩中定合愛陶潛以賀若比潛必髙人或謂賀若弼也考弼之為人殊不類潛亦無狀小人背烏丸軌之議而軌見誅爭韓擒虎之功至挺創而出不平楊素為相而有惟堪啖飯之誚至於富極貴盛家積珍玩不可計婢妾羅綺數百卒以私議大帳為煬帝所誅余考之蓋賀若夷也夷善鼓琴王涯居别墅常使鼓琴娛賔見涯傳文瑩湘山録載太宗愛宫調中十小調子乃賀若弼所撰其聲音及用指之法古今無以加世亡其名琴家秪命曰賀若文瑩不深考遂以為弼而世因是遂傳以為弼也東坡序武道士彈琴云賀若宣宗時待詔不知何所据据序則是姓賀名若依稀似曲還堪聽又被風吹别調中髙駢風筝詩也上句云夜靜絃聲響碧空宫商信任往來風駢守蜀因築羅城朝廷疑之知有移命故託風筝以見意後移渚宫出瑣言杜云鳯凰從東來何意復髙飛竹花不結實念子忍朝飢張文潛石竹云真竹不結實爾獨艷陽春竹花皆實豈有時不實如稊稗耶子美以鳯不得食為可憐耳苻堅享羣臣賦詩姜平子詩有丁字直不曲堅問其故平子曰臣丁至剛不可以屈且曲丁不直之物未足獻遂擢上第唐張洪靖節度盧龍參佐韋雍輩詬責將士曰天下無事爾輩挽兩石弓不如識一丁字後遂殺雍丁字一也或以擢第或以殺身東坡孔毅夫集句云路傍拾得半段鎗何必開爐鑄矛㦸用之如何在我爾入手當令君喪魄哥舒翰以半段鎗破吐蕃見本傳唐人詩多自用名及呼人名與第行皆情實也杜云甫昔少年日白也詩無敵退之云愈昔從軍大梁下籍也隴頭瀧之類今皆不然不特不自呼其名若呼人名則必取大怨怒世道淺促至誠之事掃地矣退之云我有雙酒盞其銀得朱提漢地里志注朱提出銀師古云提音匙漢食貨志朱提銀重八兩為一流直一千五百八十他銀一流直一千是為銀貨師古注朱音殊提音上支反蜀李嚴傳嚴子豐為朱提太守注云蘇林漢書音義云朱音銖提音如蜀人謂七曰提從師古音則提字可入支字韻押有問唐酒價者對以三百引杜詩速來相就飲一斗恰有三百青銅錢唐酒價見於唐會要貞元二年京城𣙜酒斗百五十比子美時已减其半漢昭時賣酒升四錢又何賤也豈古之升斗小耶古今人以詩名世者用字未嘗無所出杜詩嫩蕊商量細細開商量字出兌卦商兌注子美自云讀書破萬卷信矣唐雷氏琴至今有存者皆至寶也見於文字者惟元微之小胡笳引注云桂府王推官出蜀匠雷氏金徽琴請姜宣彈方知雷蓋蜀人也李杜詩當時名公皆心服退之云勃興得李杜萬類困凌暴又云少陵無人謫仙死才薄將奈石鼓何又云昔年曽讀李白杜甫詩常恨二人不相從又云李杜文章在光熖萬丈長又云逺追李杜感至諴杜牧之云李杜泛浩浩又云天外鳯凰誰得髓無人解合續絃膠韋蘇州亦多稱頌元微之則云杜甫天才頗絶倫每尋詩卷似情親憐渠直道當時語不著心源傍古人又與樂天書云得杜詩數百首愛其浩蕩津涯處處臻到始病沈宋之才不存寄興而訝子昻之未暇旁修乃不及太白何也荔子漢和帝時取之南海唐天寶時取之涪元和中取之荆南見元微之論海味表太平御覽妃子生於蜀好荔子嶺南每歲飛馳以進則涪不進久矣文粹鮑防雜感詩云五月荔子初破顔朝離象郡夕函關雁飛不到桂陽嶺馬度皆從林邑山則唐又取於廣西張曲江為李林甫所忌甚危曲江作歸燕詩贈之云無心與物競鷹隼莫相猜林甫意稍解陳文惠用吕申公薦入相久文惠作新燕詞歌以侑酒云為誰歸去為誰來主人恩重珠簾捲燕子一也或以解怨或以感恩舞馬既登牀人皆謂馬舞牀上樂府雜録云有馬舞者櫳馬人著綵衣執鞭於牀上舞躞蹄皆應節是登牀而舞乃馭者而馬應節於下也唐子西作舞馬行云天寶舞馬四百蹄綵牀襯步不㸃泥誤矣按魏志陳思王上文帝表曰臣於武皇世得大宛紫騮馬一匹教令習拜今已能拜又能行與鼓節相應是知馬可教以舞不獨唐也燕作巢避戊巳日又惡艾雀欲奪其巢則銜艾在其中燕即去見白樂天集顧况燕于巢詩序云不以甲乙銜泥其詩云燕燕于巢綴緝維戊與樂天所言不同退之此日足可惜贈張籍云聞子髙第日正從相公喪夜聞汴州亂繞壁行旁皇我時留妻子倉卒不及將退之從董晋辟汴州掌書記晋死退之送喪至洛晋死八日而汴州亂殺留後陸長源判官楊凝等退之幸而去賢者必陰有所護持也退之寄周循州云陸孟丘楊久作塵同時存者更誰人金丹别後知傳得乞取刀圭救病身四人皆董晋幕中同官陸長源孟叔度丘頴楊凝退之戒人服丹其言甚切乃乞丹於循州樂天云退之服硫黃信矣人生如寄見髙僧傳又南齊劉善明云人生如寄來會幾何樂天感時云人生詎幾何在世猶如寄秋山云人生無幾何如寄天地間東坡云人生如寄耳嶺海亦閒逰多用此事云太白云恨不挂長繩於青天繫西飛之白日李長吉云長繩繫日樂當年樂天云既無長繩繫白日二公用太白意也梅用南枝事共知青瑣紅梅詩云南枝向暖北枝寒李嶠云大庾天寒少南枝獨早芳張方注云大庾嶺上梅南枝落北枝開南唐馮延巳詞云北枝梅蕊犯霜開則南北枝事其來逺矣疾風知徑草後漢王霸傳光武曰潁川從我者皆逝子獨留疾風知徑草一也南史庾登之子仲逺為宋明府佐廢帝景和中明帝疑防賔客故人無到門者惟仲逺朝謁不替明帝即位曰卿可謂疾風知徑草二也唐蕭瑀𫝊太宗曰太上皇有廢立議顧朕挾不賞之功於昆弟不見容瑀於此時不可以利怵死懼賜詩曰疾風知徑草板蕩識誠臣三也裴諝𫝊代宗幸陜諝挾南曺印赴行在帝曰疾風知徑草果可信四也李絳𫝊絳論古今以宦官統師等事憲宗怒絳謝帝動容曰卿告朕以人所難言疾風知徑草卿當之矣五也近州郡秋試進士有出疾風知徑草詩者止本蕭瑀傳不知有五事戲表出之蛟龍得雲雨有二劉元海傳云晋武用李熹之說以元海平涼州孔恂曰元海若平涼州斬樹機能恐涼州方有難耳蛟龍得雲雨終非池中物吳周瑜𫝊劉備借荆州瑜請築館於吳多具美女珍玩以娛其心志云云今不知出此猥以土地資之臣恐蛟龍得雲雨終非池中物也東坡鍳空閣云懸空如水鏡寫此山河影妄稱桂兔蟇俗說皆可屏酉陽雜爼云月中蟾桂地影也空處水影也東坡用此桂蟇其來久矣五經通義月中有與蟾蜍何月陰也蟾蜍陽也與並明陰繫於陽也春秋演孔圖曰蟾蜍月精也虞喜安天論曰俗傳月中仙人桂樹今視其初生仙人之足已成形桂樹後生東坡故云俗說退之南山詩每句用或字或連若相從或蹙若相鬪而下五十句皆用或字詩北山之什自或燕燕居息而下用或字草有二此其例也杜詩睥睨登哀柝又連連睥睨侵或從土為埤堄城上短墻也華嚴經第十卷注音釋埤音普未反堄音宜啓反廣韻音婢詣埤堄女墻也見博雅宣十二年守埤者皆哭注城上僻倪抱朴子云韓子子冶嘗以地黃甘草哺五十歲老馬生三駒百三十歲乃死東坡地黃詩云地黃飼老馬可使光鑑人吾聞樂天語喻馬施之身非樂天語也樂天用抱朴子事耳吳淑馬賦亦引抱朴之言雜爼亦云方言以甘草地黃噉五十歲馬生三駒嶺外以枇杷為盧橘子故東坡云盧橘楊梅次第新又南村諸楊北村盧白花青葉冬不枯唐子西亦云盧橘枇杷一物也按上林賦盧橘夏熟李善引應劭云伊尹書曰箕山之東有盧橘夏熟晋灼曰盧黑也上林賦又别出枇杷恐非一物枇杷熟則黃不應云盧初學記張勃吳録曰建安有橘冬月於樹上覆裹之明年春夏色變青黑味絶美繼云上林賦盧橘夏熟又太平御覽載魏王花木志蜀土有給客橙似橘而小若柚而香冬夏花實相繼亦云盧橘又載郭璞注上林賦盧橘夏熟蜀中有給客橙即此橘也考二事則非枇杷甚明東坡子西但見嶺外所呼故云耳惠洪冷齊夜話亦辨之但未詳浙江之濤自古以為子胥餘怒蓋俗說也雖退之作詩未免用俗送惠師云回臨浙江潮屹起髙峩岷壯士死不息千年如隔辰退之云阿買不識字頗知書八分詩成使之寫亦足張吾軍不能文而能書者多矣未有不識字而能書者洪駒父詩話天棘事了不可解問魯直魯直亦不解問王仲至仲至云非烟非霧自是一種物出異書然夢青絲何謂也疑夢乃蔓字𫝊寫誤耳余按本草天門冬亦名顛棘春生藤蔓如絲杉而細正與詩合天門冬一名顛棘故有天棘之稱蔓藤細於絲杉故有蔓青絲之語子美以對江蓮搖白羽决是當時所見顧肯以非烟非霧為對耶改蔓為夢尤穿鑿元都壇云子規夜啼山竹裂王母晝下雲旗翻穿鑿者云王母禽也尾如旗昔游詩云王喬下天壇微月映皓鶴又將以王喬為禽乎王母王喬皆仙人也其言仙人降於壇耳何必以禽對禽然後為屬對精切古無長短句但歌詩耳今毛詩是也唐此風猶在明皇時李太白進木芍藥清平調亦是七言四句詩臨幸蜀登樓聽歌李嶠詞山川滿目淚沾衣亦止是一絶句詩今不復有歌詩者淫聲日盛閭巷猥䙝之談肆言於內集公燕之上士大夫不以為非可怪也淇澳衛詩也緑竹猗猗注云緑王芻竹篇竹也疏云郭璞曰似小藜赤節好生道傍可食寇恂𫝊云伐淇園之竹為矢百萬考此則緑竹乃竹之可為矢者緑言其色耳何至以緑為王芻竹為篇竹乎以緑竹之盛比衛武之美有何不可乃取道傍小藜乎竹竿亦衛詩也籊籊竹竿以釣於淇淇即淇澳也取淇竹為釣竿與伐以為矢者皆今之竹也注疏陋矣杜詩云黃鳥時兼白鳥飛黃鳥鶯也白鳥鷺也振鷺注云鷺乃白鳥也蚊亦名白鳥月令仲秋之月羣烏養羞注白鳥謂蚊蚋又金樓子齊桓寢謂仲父曰一物失所寡人悒悒白鳥營營飢而未食遂開翠紗之㡡進之東坡云不怕飛蚊如立豹矣何用更說蚊也近世譏藏書不讀者多引退之送諸葛覺詩云鄴侯家多書插架三萬軸一一排牙籖新若手未觸以言手未嘗把書故如此新耳是未嘗考其全篇也其下云為人強記覽過眼不再讀偉哉羣聖文磊落載其腹則是未嘗不讀書也鄴侯李繁也史云陽城論裴延齡使繁書已封盡能誦記乃録以示延齡延齡白帝城以疏示於朝摘其條目自訴城奏入帝怒不省以此觀之為人強記覽不誣也新若手未觸恐是言愛護之至塵埃不及或是一讀即記不假再閲故書皆如新送諸葛往從讀書且謂學問得所欲决非有書不讀者近世不考求本末小兒輩雷同以手未觸之句譏人故為辨之退之又為繁作處州孔子廟碑云鄴侯尚文其於古記無不貫達益知非不讀書者史書為隨州刺史不書為處州觀碑所稱道與史所記其人甚不相類當以退之言為正易豫之九四朋盍簪王弼云盍合也簪疾也謂朋來之速子美云盍簪喧櫪馬列炬散林鴉以簪為冠簪之簪按古冠有笄不謂之簪簪後人所名以弼言為是房融在韋后時用事謫南海過韶之廣果寺今之靈鷲也有詩云零落嗟殘命蕭條託勝因方燒三界火遽洗六情塵隔嶺天花發凌空月殿新誰憐鄉國思終此學分身融之文章見楞嚴經詩止此一篇李嶠沈宋之流方為律詩謂之近體此詩近體之祖也鄭谷海棠詩云濃艷正宜新著雨嬌嬈全在欲開時百花惟海棠未開時最可觀雨中尤佳東坡云雨中有淚益悽愴亦此意也五代詩格卑弱體物命意亦有工夫卒章云浣花溪上堪惆悵子美無心為發揚王介甫梅花云少陵為爾牽詩興可是無心賦海棠用此也穿鑿者乃云子美之母小名海棠故子美不作海棠詩不知出何典記世間花卉多矣偶不及之耳若撰一說以文之則不勝其說矣如牡丹芍藥酴醿之類子美亦未嘗有詩何獨於海棠便為有所避耶退之於李花賦之甚工又將為何說耶杜云若耶溪雲門寺吾獨胡為在泥滓南史何允𫝊居若耶溪雲門寺杜全用此六字又前漢食貨志天用莫如龍地用莫如馬子美遣興詩取兩句為兩篇首句誰知多羅樹却倚蓮花臺華嚴經十四卷音釋云多羅花形如棕櫚葉長稠密久雨無漏此翻為髙聳送王砯砯音理罽反使南海云番禺親賢領籌運神功􅍾大夫出盧宋寶貝沐脂膏盧宋盧煥宋璟也二公以清德名舊唐書云開元以來四十餘年廣府節度清白有四二公預焉寶貝沐脂膏以言不貪而寶貨多也退之陸渾火云女丁婦壬傳世昏左氏水火之妃妃音配以丁之女為壬之婦也劉夢得云盛時一失難再得桃笙葵扇安可常東坡云揚雄方言以簟為笙則知桃笙者桃竹簟也南史顧憲之傳疾疫死者裹以笙席益知笙即簟也左太冲吳都賦云桃笙象簟韜於筒中李善注云桃枝簟也東坡不喜文選故不用吳都賦嶺外有桃竹堅韌可作拄杖善謂是桃枝則恐桃枝不能為簟當從坡為桃竹東坡雪詩云青山有似少年子一夕變盡滄浪髭蓋用皮日休元魯山詩云世無用賢人青山生白髭意也魯直云百年中半夜分去一歲無多春暫來全用樂天寄元九一聨云百年夜分半一歲春無多亦演為七言宋景文落花云將飛更作回風舞李義山云落時猶自舞宋用此退之感春云前隨杜尹拜表回者杜尹兼也兼尹河南退之為都官員外郎祠濟瀆題名退之所書兼列銜其前顧况作哀閩云囝音蹇生南方閩吏得之乃絶其陽為臧為獲方言楚人謂男為臧女為獲既云絶其陽則可以為臧耳又云為獲是陰陽不分男女不辨也退之杏花云鷓鴣鉤輈猿呌歇本草鷓鴣鳴云鉤輈格磔李羣玉云方穿詰曲﨑嶇路又聽鉤輈格磔聲林逋云草泥行郭索雲木呌鉤輈當時人盛誦之以今所聞之聲不與四字合若云行不得也哥哥不知本草何故為此聲鷓鴣非啼於木上止啼於草茅中逋錢塘人浙無此禽蓋傳聞之誤段成式則云鳴云但南不北東坡琴云平生不識宫與角但聞牛鳴窖中雉登木出管子地員篇凡聽宫如牛鳴窖中聽角如雉登木日月光天德云云陳后主國亡入隋從隋文東封登芒山所獻詩也天下教兒童者以此題學書紙宣和末京師盛歌新水皆北狩之䜟東坡橄㰖云待得餘甘回齒頰已輸崖蜜十分甜王立之詩話云崖蜜櫻桃出金樓子坡意正謂蜜耳言餘甘者甘味有餘非果中餘甘也立之見餘甘為果遂以崖蜜為櫻桃杜詩云充腸多薯蕷崖蜜亦易求又云崖蜜松花白皆蜜蜂之蜜也然則崖蜜豈專是櫻桃且櫻桃非十分甜者又不與橄㰖同時杜李潮小篆歌苦縣光和尚骨力骨力二字南史張融𫝊齊髙帝見其書曰卿書殊有骨力韓增封龍額侯師古注字或作額退之晚秋聫云䇿勳封龍額歸騎獵麟腳以麟腳對龍額則不為額退之云李翺觀濤江翺復性書云南觀濤江入於越退之為此也謝安捉蒲葵扇世妄以為蜀葵廣韻栟櫚蒲葵也是棕櫚扇也豈如今之髙麗摺叠扇耶李翺為楊於陵志於陵知廣州撤蒲葵陶瓦覆屋是以棕蓋屋益知蒲葵即棕櫚是也樂天云鍾乳三千兩金叉十二行以言聲妓之多蓋用古樂府云頭上金叉十二行足下絲履五文章是一人頭插十二行叉耳非聲妓之多十二重行也太白云總為浮雲能蔽日長安不見使人愁下句用晉舉頭見日不見長安上句用陸賈新語讒臣之蔽賢猶浮雲之蔽日詩人多用元次山帶笭箵語作平上聲用廣韻音冷醒太平御覽載通俗文云竹器謂之笭箵上朗鼎切下幸鼎切皆不作平聲惟笭有靈音不知次山集笭音郎丁箵音先青牧之云杜詩韓筆愁來讀似倩麻姑癢處搔天外鳯凰誰得髓無人解合續絃膠十洲記云麟鳯洲上仙家煮鳯喙及麟角作膠名續絃膠或名連金泥能連弓弩弦折刀劍見御覽東坡鶴歎云戛然長鳴乃下趍何至以身為子娛世說有遺支道林雙鶴道林曰既有凌霄之姿何肯為人作耳目之玩養令翮成使飛去飯抄雲子白注引荀子友風而子雨雨豈可抄也武帝內傳西王母謂帝太上之藥有風實雲子一箭正墮雙飛翼長孫晟射雕一發雙貫側目似愁胡魏彥深鷹賦立如植木望似愁胡黃祖之子射命禰衡賦鸚鵡其後祖殺衡射救之不及嚴武在成都不堪少陵之慢題杜二錦江亭云莫倚善題鸚鵡賦以衡比甫有意殺之且戒之也甫酬云阮籍焉知禮法疏是無改悔意也若武冠不鈎於簾其母來少緩甫死矣祖之子救衡遲故衡死武之母救甫速故甫不死命矣夫退之兄會嘗為起居舍人謫韶州司馬退之幼從其兄到韶兄死退之後至曲江云憶昨兒童隨伯氏南來今只一身存云云㑹史無傳不知坐何事貶考之史坐元載也載傳云與載厚善貶者某人某人㑹其一也白云前月浮梁買茶去舊唐史風俗貴茶之名劒南之蒙頂云云浮梁之商貨不在焉是唐之茶商多在浮梁也杜云粔籹作人情楚詞粔籹蜜餌郭璞新語粔籹膏環也通俗文寒具謂之餲音曷則粔籹寒具今之環餅也坡云上有桓元寒具油則寒具為環餅無疑宜都山記峽中猿鳴至清山谷傳其響泠泠不盡行者歌曰巴東三峽猿鳴悲猿鳴三聲淚沾衣杜詩聽猿實下三聲淚用此也陶淵明九日閒居序秋菊盈園持醪靡由空服九華東坡云十月三日金英粲然遂召客飲萬家春且服九華詩人謂九華九日之華即菊也按真誥太元玉女有八瓊九華之丹又云授九華丹方於江上煉丹又云李八百居栖元山合九華丹成以此考之非菊乃丹也退之謝自然詩云云謝自然女道士也果州人居金泉山書夜不寐忽有雲氣散漫彌久仙去見風俗通子美以苔卧緑沉槍對雨拋金鎖甲詩人謂槍卧於苔中不用也故云緑沉續齊諧記王敬伯夜見一女命婢取酒提緑沉漆榼以此考之則緑沉者漆名也猶今所謂朱紅銀纒桿之類對金鎖甲精切掇英集載狀雲門山物柏梁體鄭槩云亭亭孤笋緑沉槍介甫雙廟云兩公天下駿無地與騰驤西京雜記文帝自代還有良馬九匹皆天下駿鷺鷥鸕鷀皆宿於喬木叢竹上晚則俱集喧噪至黑方定燕子未嘗集於木上杜云沙頭宿鷺聮拳靜又云宿鷺起圓沙又云風鴛藏近渚雨燕集新條皆取其意耳惟以孔翠為孔雀不知是孔雀翡翠也退之云買養馴孔翠逺苞樹蕉栟二物之驗也李善注文選亦然唐造茶與今不同今采茶者得芽即蒸熟焙乾唐則旋摘旋炒劉夢得試茶歌自傍芳叢摘鷹嘴斯須炒成滿室香又云陽崕隂嶺各殊氣未若竹下莓苔地竹間茶最佳今亦如此唐未有碾磨止用臼多是煎茶故張志和婢樵青使竹裏煎茶柳子厚云日午獨覺無餘聲山童隔竹敲茶臼坡詩便欲去為湯餅客多用明皇王后生日典半臂作湯餅為證唐人生日多具湯餅夢得送張盥云爾生始懸弧我作座上賔引箸舉湯餅祝詞天麒麟寧馨今往往讀作仄聲夢得云為問中華學道者幾人雄猛得寧馨則平聲無疑荆公多用晋白雞事酬許奉議云後㑹敢期黃耉日相看且度白雞年游齊安院云老值白雞能不死復隨春色破寒來次張唐公韻云君騎白鳯今何處我適新年過白雞蓋公生於辛酉也騎白鳯事見孫光憲北夢瑣言沈詢除節旄曺唐作逰仙詩玉詔新除沈侍郎便分茅土領東方不知今夜逰何處侍從皆騎白鳯凰東坡云自怪騎白鳯君子偕老疏鞠衣黃桑服也色如麯塵象桑葉始生元微之三泉驛云新葉麯塵花落地樂天山石榴云千房萬葉一時新嫩紫殷紅鮮麯塵夢得云龍墀遙望麯塵絲介甫云日髙青女尚橫陳又云水歸洲渚得橫陳用楞嚴於橫陳時味如嚼蠟事唐李義山小憐玉體橫陳夜已報周師入晋陽唐張薦靈怪集東蔡女鬼與裴紹祖詩云橫陳君不御惟知思不絶漢魏文章宋玉諷賦主人之女歌曰內怵惕兮徂玉牀橫自陳兮君之旁橫陳蓋出於此左氏室如懸罄言室中之物垂盡以罄訓盡也其下云野無青草則罄恐是器物但非今之僧磬也若以古之鐘磬言之則磬皆曲折片石無中虛之理說文罄虛器以是知為器物但不知於今為何器子厚云三畝得留懸罄室九原猶記若堂封李義山云不憂懸罄乏乍喜覆盂安𤣥菟郡多作平聲義山云可惜前朝𤣥菟郡積骸成莽陳雲深則作仄音燈檠平聲義山云六曲屏風江雨急九枝燈檠夜珠圓則又為仄音唐人多不用師古注漢書音如魁梧音悟嫖姚皆去聲杜云夫子魁梧則梧為平聲李杜皆押嫖姚為平聲楊巨源請問漢家誰第一麒麟閣上識鄼侯則音贊者又不用也楊太真妃本壽王瑁妃也𤣥宗納之為壽王别娶韋昭訓女李義山驪山詩云驪岫飛泉泛暖香九龍呵護玉蓮房平明每幸長生殿不從金輿惟壽王石炭自本朝河北山東陜西方出遂及京師陳堯佐理河東時始除其稅元豐元年徐州始發東坡作詩記其事水經魏土記枝渠東南火山出石炭火之爇同樵炭則石炭六朝時已有杜八桂云五嶺皆炎熱五嶺說多不同後漢吳祐劉表𫝊注西自衡山之南東至於海一山之限標名有五裴氏廣州記大庾始安臨賀桂陽揭陽是為五嶺鄧德明南康記亦分五嶺與裴不同水經郴縣黃岑山騎田之嶠五嶺第二嶺也桂陽部山即部龍之嶠五嶺第三嶺也營道縣萌緒之嶠五嶺第四嶺也越城嶠五嶺之西嶺秦置五嶺之戌是其一又云始安嶠即越城嶠又云大庾嶺五嶺之最東當以水經為正則八桂諸家皆不以為嶺今自湖南入廣西未嘗有險阻子美有小至詩說者謂冬至前一日為小至盧照鄰年日述懷云人歌小歲酒花舞大唐春是以元日為小歲以此觀之子美之小至即冬至也盧詩見歲時雜詠十二時寅音怡禮部韻訓時也若真字韻寅則訓恭然唐人亦作寅字押冷朝陽云玉律催佳節青陽應北辰下云寒餘月建寅是也唐人不分韻作詩止用一字如陳子昻晦日髙文學置酒林亭賦者十人止押霞字如周彥暉晦日重宴亦十人同押池字唐人以正月下旬送窮韓退之有文姚合有詩云萬户千門看無人不送窮唐人以正月晦為節德宗改用二月一日號中和節吕渭和德宗詩云皇心不向晦别節號中和李義山云取酒一封駝前漢大月氐一封槖駝注脊上有一封言其隆髙若封土俗號封牛子美孟冬云破瓜霜落刃歲時雜詠乃云破甘霜落刃恐雜詠為是孟冬無瓜矣子美贈畢四云饑寒童僕賤顔狀老翁為漢魏文章王文考王孫賦云顔狀似乎老翁是以猴戲畢洪駒父詩話退之云誰謂貽厥無基址是歇後語晋五行志何曽曰國家無貽厥之謀以此知退之用字亦必有本也子厚云且盡薑芽斂手徒又云薑芽盡是捧心人以手如薑芽斂手義手也又言捧心則知為手無疑相書手如薑芽者貴退之云畫蛇著足無用處為蛇畫足見戰國䇿與史記楚世家及陳軫𫝊莊子以為脊脅而行方朔射守宫曰謂之為蛇又有足以言蛇無足也按本草蝮蛇陶隱居注云蛇皆有足燒地令熱以酒沃之置中足出酉陽雜爼云蛇以桑柴燒之則見足出余在曲江老兵捕一蛇燒之四足垂出如雞足狀以此知古人有未盡窮之事孟子言緣木求魚以其不可得也本草鰻鱺魚陶注云能緣樹食藤花唐注亦云有四腳能緣樹雜爼鯢魚能上樹莊子衆雌無雄又奚卵焉今雞鴨有無雄而卵者但不能抱成子耳芰即菱也花白生水下杜牧之晚晴賦云復引丹於深灣忽八九之紅芰姹然如婦斂然如女是以芰為蓮花牽牛河鼓詩人多用為七夕事見爾雅河鼓謂之牽牛注今荆楚呼牽牛為擔鼓擔者何也何音荷以平聲讀之從水者非太白古風云君子變猿鶴小人為沙蟲退之云穆昔南征軍不歸沙蟲猿鶴伏以飛抱朴子云穆王軍散於南君子化為猿鶴小人化為沙蟲二公用此退之盛山十二詩序云不知出於巴東以屬朐䏰唐韻朐音蠢䏰音閏巴東郡之縣名地下濕多朐䏰蟲因以為名盛山今之開州唐地里志云古巴東郡之朐䏰故也顔師古於漢地里志朐音劬當以唐韻音為是東坡云青浮卵碗槐牙餅紅㸃氷盤藿葉魚槐牙冷淘見杜詩藿葉膾見禮記注牛與羊魚之腥聶而切之為膾注聶䐑也先藿葉切之復報切之然後為膾唐至德一年改蜀郡為南京杜云南京犀浦道為蜀郡也又云南京久客耕南畝注云明皇幸蜀以成都為南京非也唐人重端石硯見劉夢得謝唐秀才惠端州紫石硯云端州石硯人間重李賀青花紫石硯歌云端州匠者巧如神露天磨劍割紫雲栁公權論硯云端溪石為硯至妙益墨青紫色者可直千金水中石其色青山半石紫山頂石尤潤如猪肝色者佳貯水處有赤白黃㸃世謂鸜鵒眼脉理黃者謂之金線相眼之法盡於此李賀青花紫石者蓋硯之上品也東坡論許敬宗硯云是端石敬宗髙宗時人則唐重此硯其來久矣魏道輔東軒茟録記端硯三坑不甚詳東坡云此生有味在三餘用董遇冬者歲之餘夜者日之餘隂雨者時之餘皆為閒暇無事時也人有疑陰雨者蓋陰雨則無出入無賔客俗事少故可以讀書余嘗驗之乃知古人不虛語也京師以探刺者為覷步唐有此語強梁御史人覷步安得夜開沽酒户唐國忌禁用刑作樂狼籍囚徒滿田地明日不推緣國忌依前不得花前醉皆元微之詩禁作樂今猶唐也禁刑之令弛矣杜子美會須上番看成竹元微之飛舞先春雪因依上番梅俱用上番字則上番不專為竹也退之笋詩云庸知上幾番又作平聲押桂林以地有八桂退之云蒼蒼森八桂山海經云八樹成林唐韻亦云故淵明詩云亭亭凌風桂八幹共成林外臺見唐髙元裕傳故事三司監院官帶御史者號外臺得察風俗舉不法監院屬三司如楊子院是也皆貨財轉易之地故今監司亦號外臺皆以察風俗舉不法劉夢得和南海馬大夫云漢家旌斾付雄才百越南溟統外臺以馬揔帶御史大夫也唐本草注雁與燕相反燕來則雁往燕往則雁來故坡云秋鴻社燕巧相違退之詩不辨薋菉葹用楚詞薋菉葹以盈室兮判獨離而不服歎立之不用於世不為人所知魯直酴釄云風流付枕幃又云夢寐宜人入枕囊說者謂幃幕為枕屏之類非也楚詞蘇糞壤以充幃注幃謂之幐幐香囊也又云榝欲充其佩幃注幃盛香之囊則知幃乃枕囊也張平子思𤣥賦云􅀈幽蘭李善注說文曰繫幃曰􅀈爾雅云婦人之幃謂之縭今之香囊在男曰幃在女曰縭􅀈者繫囊之繩是也坡云刺舌君今宜自戒灸眉我亦更何辭灸眉見晋郭舒傳王澄以舒為狂使人搯鼻灸眉頭刺舌見隋賀若弼傳父敦臨刑呼弼曰吾以舌死汝不可不思引錐刺弼舌出血戒以口過坡平生以語言得禍故畏之如此退之序云携被入直三省丁寧顧婢子語刺刺不能休有好竒者讀如吾日三省之省且以三省丁寧為句又謂唐無三省之名是未之考也六典既修以來侍中中書令尚書令謂之三省長官唐言三省處甚多且如陸扆傳三省得窣相有光署錢是也張籍寄白舍人云三省比年名望重李頎緩歌云三省官僚揖者希見文粹若不言三省不知入直何所㩦被入直何用日三省為既云日三省不知丁寧者為何人皆妄鑿也劉夢得生師講堂云一方明月可中庭張籍秋山詩云秋山無雲可無風兩可字義不同然皆新而不怪世傳不逄韓玉汝有應聲對者曰可怕李金吾以金吾對玉汝為切唐有孫玉汝則玉汝為名字不始於韓也見李景讓傳退之云何人有酒身無事誰家多竹門可𣢾無事飲犀首也袁粲尹丹陽郡南一家頗有竹石率爾步往亦不通主人直造竹所嘯咏自得主人出語笑欵然杜牧之斑竹簟云分明知是湘妃淚何忍將身卧淚痕述異記舜葬蒼梧娥皇女英淚下沾竹竹悉為斑坡云宜蠶使女繭如甕述異記云園客種五色香草有五色蛾集其上蠶時有一女來養蠶得繭百二十枚大如甕女與客俱化去坡云彭仇不難逐宣室志僧契虛遊稚川山頂見宫殿有具簪冕者曰稚川真君也真君曰爾絶三彭之仇乎契虛不能對真君曰不可留也坡曰玉骨何勞獺髓醫拾遺記孫和月下舞水晶如意傷鄧夫人頰醫曰得白獺髓雜玉與琥珀屑當滅痕坡云但令有婦如康子安問生兒比仲謀皇甫謐髙士傳黔婁先生卒曽西來弔見覆以布被覆頭則足見覆足則頭見曽西曰斜其被則斂矣其妻曰先生生而不邪死而邪之非先生之意也西曰以何為諡妻曰諡曰康西曰先生存時食不充飽衣不盡形何以諡為康妻曰昔先生君欲用為國相辭不為是有餘貴君賜粟辭不受是有餘富甘天下之淡味安天下之卑位諡為康不亦宜乎魏書生子當如孫仲謀劉景升兒子豚犬耳坡云揚州銅器越州羅爭唱洪農得寶歌見韋堅傳云云退之與孟郊聮句前輩皆謂退之粉飾恐皆出退之不特粉飾也以答孟郊詩觀之如弱拒喜張臂猛拏閒縮瓜見倒誰肯扶從嗔我須咬則聮句皆退之作無疑也元厚之與介甫詩云陳前輿服嘉桓傅拜後金珠有魯公是時三經義成有賜豫元絳亦加職厚之此詩為切當桓榮以所賜輿服陳之前曰此稽古之力也公羊封魯公以為周公也周公拜乎前魯公拜乎後栁子厚云沉吟亦何事隗囂傳邯得書沉吟十餘日符丕傳啖竒謂諸將曰東討姚萇不可沉吟猶豫龎統傳若沉吟不去當致大困退之詩雞三號更五㸃晋律厯志有雞始三號坡云留連一物吾過矣北史盧思道謂王晞曰昨被召己來頗得無以魚鳥致怪晞答曰云云卿輩亦是留連之一物豈直在魚鳥坡云百尺飛泉瀉漏天任升梁益記漏天在雅之西北山髙谷深陰晦常雨又云憒憒到天公晋天文志康帝三年歲星犯天關庾翼與其兄氷書曰歲星犯天關占云梁益當分比來江東無他故而石季龍頻年再閉關不通信使此復是天公憒憒無皂白之徵又云天形倚一笠晋天文志天似蓋笠左氏三后之姓於今為庶杜云將軍魏武之子孫於今為庶為清門用此也句法有相似者元云房杜王魏之子孫杜云殿腳插入赤河渾元云日腳插入秋波紅外來之物曰義如義兒是也元云醉插櫻桃投小玉義梳叢髻舞曺婆風之逆舟人謂之打頭風坡云卧聽三老白事半夜南風打頭元云江喧過雲雨船泊打頭風過雲雨亦俗諺洞庭湖元云駕浪沉西日吞空接曙河比吳楚東南坼乾坤日夜浮則元為費力蜀人云灔澦如馬瞿塘莫下灔澦如象瞿塘莫上杜云如馬戒舟航白樂天云五月斷行舟灔澦正如馬親家翁開素鵲填河皆俗語白樂天用俗語為多贈皇甫郎中親家翁晚接嘉姻不失親又云月終齊滿誰開素須記竒章置一筵又云秃似鵲填河少游云夢魂思汝鳥工往世故著人羊負來膾炙人口鳥工往舜濬井事羊負來乃蒼耳子見千金要方果菜門蒲栁望秋先零二物弱最早凋或以蒲柳為柳柳甚可怪也馬融賦樹以蒲柳注蒲也柳也何嘗以為一物况以對松柏經霜逾茂說文亦云楊蒲柳也坡云賀雨詩成即諌書樂天有賀雨詩末章云一言獻天聰君以明為聖臣以直為忠敢賀有其始亦賀有其終此即諫疏也淡菜貝中海錯之美韓退之孔戣墓志曰淡菜蚶蛤之屬李長吉詩云淡菜生寒日以天色極寒方出元微之論海錯亦云淡菜海蚶之屬子美沙苑行為馬詩也末章云泉出巨魚長比人丹砂作尾黃金鱗豈知異物同精氣雖未成龍亦有神同州志云沙苑有泉泉多大魚杜意魚與馬皆可成龍介甫云投老歸來一幅巾黃塵投老别悠悠投老歸來天柱峯投老見後漢仇覽𫝊云苦身投老王羲之𫝊懷祖正當作尚書投老可得僕射歐陽永叔贈介甫云翰林風月三千首吏部文章二百年介甫答云他日若能窺孟子終身何敢望韓公議者謂介甫怒永叔以退之相比介甫不知二百事乃南史謝朓吏部也沈約見其詩云二百年來無此詩以介甫為誤以余考之歐公必不以謝比介甫介甫不應誤以謝為韓也孫樵與髙錫望書曰唐朝以來索士二百年間作者數十輩獨髙韓吏部歐公用此耳介甫未嘗誤認事也見孫樵集坡云腹搖鼻息庭花落償盡當年未足心孫樵云腹搖鼻息夢到鄉國槐花撲庭鳴蜩噪晴退之送馬總南海云衙時龍户集上日馬人來馬人見佛書毗舍離國有一類人如馬裸露王運神力分身為蠶乃得衣王生中土馬人感戀號馬鳴菩薩見𫝊燈十一祖龍户即蛋戶也杜云竹根稚子無人見稚子即笋或以為竹䶉非也牧之云幽笋稚相携小蓮娃欲語以蓮比娃以笋比稚子與子美同意陳子高云我亦快飲月氐頭史記胸奴破月氐以其頭為飲器春秋後語智伯圍趙襄子智伯大敗漆其頭為飲器漢張騫傳晋灼注為虎子周官玉府掌䙝器鄭司農注虎子也魏蘇則為侍中親省起居執虎子吉茂嘲之曰仕宦不已執虎子介甫云虎士開閶闔雞人唱早朝虎士衛士也魏許禇傳太祖引入宿衛從禇俠客皆以為虎士又周禮虎賁氏虎士八百人淮人歲莫家人宴集曰潑散韋蘇州云田婦有嘉獻潑散新歲餘詩人論魯直酴醿云露濕何郎試湯餅日烘荀令炷爐香不以婦人比花乃用美丈夫事不知魯直此格亦有來歷李義山早梅云謝郎衣袖多翻雪荀令薰爐更換香亦以美丈夫比花魯直為工酒斟滿捧觴必蘸指甲牧之云為君蘸甲十分飲夢得云蘸甲須歡便到來古酒瓶號三雅伯雅仲雅季雅夢得云酒每傾三雅蔡興宗作杜詩考異嬋姢碧鮮靜肅槭寒蘀聚蘚字從别本蓋字畫稍缺而釋音者云嬋娟碧鮮皆竹也尤謬非釋者謬興宗謬也按碧鮮出文選吳都賦玉潤碧鮮正謂竹也乃以為碧蘚兒童之見也捨舊集而從别本何也五代扈蒙作碧鮮詩得名嬋姢美貌以言碧鮮之美豈以碧鮮為蘚哉文選成公子安嘯賦云蔭修竹之嬋娟注云嬋娟美貌杜云拄到玊女洗頭盆真誥玉女居華山祠前五石臼號玊女洗頭盆太白云漢帝重阿嬌貯之黃金屋見漢武故事武帝四歲長主抱著膝上問曰阿嬌好否對曰好若得阿嬌為婦當作黃金屋貯之乃定昏坡云一似獮猴騎土牛魏晋世語尚書鍾繇謂周泰君釋褐登宰府乞兒乘小車一何駛也泰曰君名公之子少有文彩故守吏職獮猴騎土牛一何遲耶杜䕫州詩云身許雙峯寺門求七祖禪注云釋氏有六祖今云七莫知其故六祖傳法青源思不𫝊衣謂之七祖雙峯惠義寺也杜有惠義寺送辛員外詩云雙峯寂寂對春臺子美鹽井詩自公斗三百轉致斛六千便見當時川中鹽價與啇賈所販之息使後世有考焉真詩史也唐子西作溫泉記其下未必有硫黃以為水受性本然李賀云華清宫中礬石湯以此觀之泉之溫其下必有硫黃礬石之類無疑杜云自平中官口口太一收珠南海千餘日唐宦者吕太一反嶺南以韋倫為韶州刺史見倫傳印本多以官為宫或者又妄以為宫中杜山水障云咫尺應須論萬里南史蕭賁扇上圖山水咫尺之內便覺萬里為遙退之百葉緋桃云應知侍史歸天上故伴仙郎宿禁中周禮天官注奚三百人若今之侍史官婢後漢尚書郎給侍史二人皆選端正婉麗執香爐護衣服為文用偏旁字顔延年白馬賦秀騏齊亍潘安仁射雉賦張衡舞賦並用彳亍二字彳丑亦切亍丑録切韓詩刻畫架崖亍今人不敢用醉翁亭記終始用也字結局議者或紛紛不知古有此例易離卦一篇終始用也字莊子大宗師自不自適其適至皆物之情皆用也字以是知前輩文格不可妄議四海之內物有未盡識者不可著之書鷴白羽黑文胸頸皆青冠面足皆赤不純白也雪賦乃曰白鷴失素是未盡識鷴也後赤壁賦舉網得魚巨口細鱗狀如松江之鱸多不知為何等魚考之乃鱖魚也廣韻注鱖巨口細鱗山海經云鱖巨口細鱗有斑彩以是知東坡一言一句無所茍也東坡作鍾子翼哀詞用四字七字為句崆峒摩天章貢嗽石致西確荀子成相篇格也句皆叶韻如人主無賢如瞽無相何倀倀王文考靈光殿賦彤彤靈宫巋㠑穹崇紛龎鴻兮其下皆叶韻但加兮字東坡笑笑先生贊竹亦得風夭然而笑世皆以夭為天然非也說文笑字竹得風其體夭屈如人之笑吳丞相為歐陽永叔行狀云仁宗遇公厚論及當世才目公曰如歐陽某者豈易得哉韓魏公作墓志載仁廟語如歐陽某何處得來不加文飾有以見仁廟厚質之言如此得直述之體也退之毛穎𫝊吾子孫神明之後四字子産獻陳捷於晋語也退之為文用古人語如己出所以為竒武后見駱賔王為徐敬業作檄語至一抔之土未乾六尺之孤何在曰宰相安得失此人李襲吉為李克用與梁書朱全忠讀至毒手老拳交爭於暮夜金戈鐡馬蹂踐於明時嘆曰李公僻處有士如此使吾得之傅虎以翼文章號令豈可不擇人李德裕勿以子孫之謀而存輔車之勢三鎮凛凛不敢結連對敵傷居爾體痛在朕躬將士為之感服文章之功省力於長槍大劒如此韓退之文章上繼班馬蓋不待言然當時之有異論平淮西碑遂至磨仆此憲宗迫於諸將之意耳至皇甫湜謂退之文如長江秋注千里一道然施於灌溉或爽於用湜學退之不知退之未嘗為無用之文也况不親炙之者乎羅池廟碑卓絶今古舊史乃曰南人好巫退之遂實其𫝊此文之紕繆者然後世何嘗以此等之言為信青蠅之矢變亂白黑何益哉劉夢得氣髙不服人祭退之文極言稱贊鸞鳯一鳴蜩螳革音手持文柄髙視寰海權衡低昻瞻我所在三十餘年聲名塞天牧之云杜詩韓筆愁來讀似倩麻姑癢處搔天外鳯凰誰得髓無人解合續絃膠皆實録也班孟堅載史記冗語極簡健亦有所改字不若遷者陸賈謂五子曰與汝約過女女給人馬酒食極欲十日而更所死家得寶劔車騎侍從者說者謂賈所死之家得此物考上文云賈常乘安車駟馬從歌鼓琴瑟侍者十人寶劍直百金謂其子云云何待死而後與以遷史考之乃徙字謂十日後遷徙别之一子或過他客去則以所携之物與之耳若作死字恐無意味世之大儒有其論不可曉者歐公以繫辭非孔子之言詆之甚力蘇子由解詩不用詩序今用其說尚解不行乃去而不用以自己意解之且如七月陳王業也云云故其詩陳農桑之事與序合若子由不用序陳王業一首不知一篇為何而作此易曉者其他詩有未易曉者若不用序則尤更茫然王介甫云有周公之功則可用天子之禮樂是以為周公無恙時所用也以傳考之周公死之後成王方賜之獨用於周公之廟祭祀耳使周公無恙必不敢當此周公以四國流言甚畏懼詩書所載詳矣卒不失其聖如狼跋之美其後四國之君相繼誅滅使生而偃然乘天子旌旗用天子禮樂豈不慮流言復起乎成王雖曰報周公之功厚不知天子之禮樂豈可假人使周公有靈必不享也適所以啓魯之後僣竊之禍八佾之舞雍之徹泰山之旅皆自此起矣是則成王之過也退之馬蹄研銘云天馬有靈迹在於石漢武紀獲汗血馬注踏石汗血一日千里踏石有迹以言蹄之堅有力東坡月石研銘石苑苑兮黑白月法苑珠林西方有一月分白黑一日至十五為白十六至三十為黑介甫字說往往出於小說佛書且如天一而大蓋出春秋說辭天之為言填也居髙理下含為太一分為殊形故立字一而大見法苑珠林如星字物生於下精成於列精成於列晋天文志張衡論也鸜鵒勾其足而欲見酉陽雜爼鸜鵒之交勾其足往往墮地人掩之以為媚藥年字禾一成為年書正義孔炎曰年取禾榖一熟潛珍閣銘云信蒼蒼之非色極深逺而自然莊子天之蒼蒼其色正耶其視下也亦若是而已矣漢郗萌記夭夭無質仰而瞻之髙逺無極眼瞀精絶故蒼蒼然也譬如旁望逺道之黃山皆青俯察千仞之谷而窈黑青非真色黑非大體也東坡順濟龍王廟新獲石砮記引禹貢荆揚所貢及春秋時隼集陳庭楛矢貫足石砮長尺有咫孔子逺取之肅慎顔師古注云楛矢堪為笴今豳以北用之以此考用楛為矢至唐猶然用石為砮自春秋以來莫之識矣余讀晋肅慎傳魏景元以來貢楛矢石砮晋元帝時詣江左貢石砮其地有山出石其利入鐵唐黑水靺鞨傳居肅慎之地其矢鏃長二寸蓋楛矢遺法則自唐以來皆有石砮非春秋以來莫之識也坡知唐猶用楛矢而不知用石為砮至晋唐也語云松柏後凋松柏未嘗不凋特歲寒時不凋凋時後衆木耳記云貫四時而不改柯易葉柯不改是也葉未嘗不易也松竹皆於霜雪之際不凋至春秋則换葉記雜漢儒之言與聖人之言逈然不同近世傳東坡注杜詩李歜編者誕妄無根不可名狀其言某事某論者今皆無此書一妄也且古人語各不同如三國時與西漢人語兩漢人與六朝人語各有體格今皆一律此二妄也詩人用古語三字或兩字或全句多矣取其自然不如是切當是撰字貼詩惟恐句中漏一兩字使人覺之甚可笑此三妄也其大妄者有三有灼然有出處而歜不知者又東坡雜說中論杜詩及録出處者極多無一字及此以是知其尤妄誕小兒輩好竒未多讀書真以為東坡所注故為辨之淮南王諌武帝誅閩越云施舟而入水行數百里夾以深林叢竹水道上下擊石林中多蝮蛇猛獸又云領水之山峭峻漂石破舟退之送區册云陽山天下之窮處陸有丘陵之險虎豹之虞水有江流悍急橫波之石廉利侔劍㦸舟上下失勢破碎淪沒者往往有之退之似祖述助者然皆奇語牧之阿房賦復道橫空未雲何龍議者謂龍星也非真龍也不可比復道北史賀師夏以龍見請雩時髙阿那肱録尚書事謂為真龍出見大驚喜問龍所在作何顔色師曰此是龍星初見依禮當雩郊壇非真龍也阿那肱忿然曰漢兒多事強知星宿祭事不行方牧之下茟時偶不記此耶雖然凡物之生乎下者皆有星主乎上爾雅注吁嗟請雨雨龍所司也龍星雖非真龍然所主龍也故請雨則以其夏見之時又爾雅􅤔蝀謂之雩蝀虹也以比橫空之復道又何害爾雅非周公書也郭璞序云興於中古隆於漢氏未嘗指為周公蓋是漢儒所作亦非中古也其言多釋詩以是知之如切如磋如琢如磨瑟兮僴兮赫兮喧兮之類皆衛詩猗嗟名兮刺魯詩是皆列國之風非周公與中古時明矣世多用孔子作春秋游夏不能措一詞孔子世家云筆則筆削則削子夏之徒不能贊一詞未嘗及子游豈見云子夏之徒遂增子游耶又贊詞非措詞也子雲長楊羽獵賦模倣相如也雄傳云雄常好詞賦蜀有相如作賦甚閒麗溫雅雄心壯之每作賦擬之為式其著書乃謂相如靡麗之賦勸百而諷一猶騁鄭衛之聲曲終而奏雅何也班固謂與詩之諷諌何異為雄戲言是已雄鄙賦不作可也既作之又不以為是何耶嵩髙詩維嶽降神生甫及申蓋言申伯仲山甫皆宣王輔佐之賢注乃以甫為甫侯甫侯乃穆王時人漢刑法志周道既衰穆王眊荒命甫侯度時作刑去宣王時逺矣觀蒸民一詩專美山甫之功之德則嵩髙所美為山甫不疑余嘗疑蘇子由解詩不用序以為非子夏所作子夏所作見文選考後漢儒林傳衛宏作毛詩序得風雅之㫖於今傳於世又隋經籍志初毛公作詩序衛宏益之乃知子由亦有所本王介甫答韓求仁書則云序詩者不知何人然非達先王之法言者不能為也故其言約而明肆而深要當精思熟講之不當疑其失荆公亦不知為衛宏作也退之謂子夏不序詩漢之學者籍之子夏是已退之祭文虎入其廄以我􅐒去唐韻驢子曰􅐒亦見何承天纂文禹惡㫖酒見戰國䇿梁王魏嬰觴諸侯於范臺酒酣請魯君舉觴魯君曰昔帝女令儀狄作酒美進之禹禹飲而甘之遂踈儀狄絶㫖酒曰後世必有以酒亡其國者本草鶩注陳藏器本草云尸子云野鴨為鳬家鴨為鶩不能飛翔如庶人守耕稼而已余是以知周禮庶人執鶩之義如此凡為文合於古則不免世俗譏評君子不恤也歐公作尹師魯墓志王介甫作錢公甫墓志皆不免紛紛况他人乎二公作書力辨可以為庸妄之戒猗覺寮雜記卷上
