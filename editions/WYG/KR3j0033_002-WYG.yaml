body:
  text: 猗覺寮襍記卷下宋朱翌撰憲宗迎佛骨於鳳翔退之諫甚切卒不從退之被斥海上懿宗咸通中又往迎之或言憲宗嘗為此俄不祥懿宗曰使朕生見之死不恨李蔚苦諫亦不聴見蔚𫝊後唐有僧得佛牙於西域明宗以示大臣趙鳳曰臣聞佛牙水火不能傷請騐其真偽以斧砍之應手而碎先是宫中施物以數千鳳碎之乃止見鳳傳明宗之好已不减於憲懿而趙鳳之䇿乃省力於韓李仁宗時孔道輔擊蛇亦用鳳䇿退之符離白兎書稱説功徳祥應唐明宗時宿州亦獻白兎安重誨曰兎隂且狡雖白何為却而不以聞二公所見不同如此浩孔異以百口保孫仲謀遣子入侍郗超以百口保桓温於簡文裴度以百口保魏博盧把以百口保李希烈張説以百口保不慮减兵而招冦姚崇以百口保内外官無反者杜佑以百口保李藩古人不愛家族保人於天子之前可謂忠矣諸人徃徃不負所保獨希烈不然徳宗不責保人亦惑矣舊唐史載開元以來治廣清白者四人宋璟裴伷先李尚隱盧奐新史止載三人不及伷先張嘉貞𫝊廣州都督裴伷先抵罪亦不載何罪自三代而下創業守文之君兼之者惟唐太宗漢之文景武宣皆不及也其後永徽有貞觀風見張説𫝊開元有貞觀風見姚崇𫝊建中有貞觀風見李吉甫𫝊惜乎三君皆不克終遂使太宗獨稱焉九合諸侯人皆知有管仲不知有魏絳也以一旦之功加萬世之功人皆知為蕭何不知前有狐偃也鷙鳥累百不如一鶚人知有禰衡而不知有鄒陽書也晋文渡河北歸行賞狐偃為首或曰城濮之事先軫之謀文公曰城濮之事偃説我無失信先軫曰軍事勝為右吾用之以勝然此一時之説偃言萬世之功奈何以一時之利加萬世之功乎唐百官志有書學故唐人無不善書逺至邊裔書史里儒莫不書字有法至今碑刻可見也往往勝於今之士大夫亦由上之所好有以勸誘之貞觀中集王羲之書為一百五十卷選貴臣子弟有性識者以為宏文館學生内出法書命之習學人間有善書者亦召入館海内向風工書者衆見唐厯凢物順則死逆則活魚無不逆水而上雖至細之鱗遇大水亦搶而上力不勝則稍隨水而下力定復上禽鳥亦多逆風而飛人亦如此飽暖安樂縱情恣意如是夭折者多矣使辛苦憂畏拂亂心志能謹畏無意外事可以永年孫思邈論養性以憂畏為夲其言反復甚切所謂五行不順行者亦此事也柳芳唐厯書武后載初元年九月壬午改天授元年三年四月丙申改如意元年是年九月庚子改長夀元年計三年新書自天授元年正月庚辰改載初盡二年十月改長夀不載如意計一年十月新書永昌後有天授自天授改載初而唐厯無天授自永昌後改載初而唐厯延載之後有登聖新書無之年號史家當具載無去取也不知何為如此差誤宋文帝問顔延之諸子所能延之曰竣得臣筆側得臣文得臣義躍得臣酒唐宋令文三子各得令文一絶之問文章之悌蹻勇之遜草𨽻范文正三子各得父之一忠宣得相業純粹得将才純禮得文章南人以鹽收鴨子曰醎丸子爾雅杬魚毒注謂杬皮厚赤汁中藏卵果不壊當用杬字戰國䇿陳軫言楚人有兩妻挑其長者長者罵之挑其少者少者許之居無幾何有兩妻者死客謂挑者曰女取長者乎少者乎曰取長者客曰長者罵女少者和女女何為取長者曰居彼人之所則欲其許我今為我妻則欲其罵人後漢馮衍𫝊記有挑其鄉人之妻者挑其長者長者罵之挑其少者少者報之後其夫死而取其長者或謂之曰非罵爾者耶曰在人欲其報我在我欲其罵人范史所記比戰國䇿語簡而意足大抵班范善刪裁前人之文得體要法始皇諱政以正月為正月吕后諱雉以雉為野雞楊行宻據揚州州人以蜜為蜂糖錢元瓘據浙浙人以一貫為一千石勒據長安北人以羅勒為香菜至今不改必是當時犯諱令嚴故人不敢犯夲朝寛厚自非舉子為文臣寮奏牘不敢犯廟諱天下人語言未嘗諱也黄王不分江南之音也嶺外尤甚柳子厚黄溪記神王姓莽之世也莽嘗曰余黄虞之後也黄與王聲相邇以此考之自唐以來已然矣國學立孔子廟始武徳二年以孔子為先聖顔子為先師始貞觀中以孔子為文宣王顔子為兖公十哲為侯文宣王南面十哲夾坐曽參等為伯始開元二十七年孟子配享則始於元祐元年世號贅婿為布袋多不暁其義如入布袋氣不得出頃附舟入浙有一同舟者號李布袋篙人謂其徒曰如何入舍婿謂之布袋衆無語忽一人曰語訛也謂之補代人家有女無子恐世代自此絶不肯嫁出招壻以補其世代耳此言極有理劉仁軌征百濟請厯日一卷人問之曰削平遼海湏示國家正朔李勉侍帝指案上厯日曰卿擇佳日曰某日良帝曰卿以是日遂相劉瑑亦如此後周宣帝毎捶人以百二十為度名曰天杖五代劉銖毎杖一人必兩杖俱下謂之合歡杖又隨年數杖之謂之隨年杖三代之禮不可行於今籩豆簠簋冠冕裳幅姑存古制而已不可廢也有一士人作䘮禮以遺一貴人貴人出以示余曰何如余曰考究禮文皆是無可疑者曰可行乎余曰不可行貴人曰何為不可行也古人始死也自屬纊至大小歛陳尸之所皆有法如哭泣之聲弔問之位皆有叙殯於寢五月七月之葬三虞之祭如此之類皆於人不恊且如今之人家宅宇安得如古之制所謂寢所謂堂阼階賔階之類向南向北皆不合於古又人家卜筮年月利不利安能行百日虞祭方荒迷哭泣安能一一陳古禮若暑月一夕之陳則有害矣何暇論大斂小斂次序且如有五兄弟一為公一為卿一為大夫一為士一為庶人則禮從異而不同若使之各行其禮乎若止推長者或官髙者行禮則已不合於古矣至於紼縴帷裳之具畫象事之與古人用尸一一不同故不可行貴人曰然則古人何為行得余曰惟古人能行葢古人於吉㐫賔軍嘉五禮未嘗頃刻廢也此身此心日夜往来乎規矩法度之中故不以為苦今之人吉㓙賔軍嘉禮未嘗少留意忽一日家有變故乃欲使之周旋於此必以為大苦矣是以不能行也荒迷之中一旦强之必有可笑此事又不可預使之習儀且男子行之可也婦人女子如之何一旦倉卒喻之使如禮乎然則有可行者曰無所不用其至與夫哀而止耳此則人人可責不問賢愚貴賤古與今也若不誠於中而區區泥古之文非聖人之意也草具三戰國䇿齊馮煖云云左右以君賤之也食以草具范睢𫝊王弗信使舍食草具待命陳平𫝊漢以為項王使以惡草具進淮以南酒家以升記淮之北以角記詩我姑酌彼金罍䟽一升曰爵爵盡也足也二升曰觚觚寡也飲當少三升曰觶觶適也飲當自適四升曰角角觸也觸罪也五升曰散散訕也飲不節人自謗訕其實曰觴觴餉也觥大也升罰有過觥廓也君子有過廓然明著士人曽為僧南史伏挺之不堪蔬素還俗唐馮嘉運許淹韋渠牟蔡京嚴礪箭筒左氏謂之氷注謂之櫝丸廣韻謂之鞲音歩靫馬甲金装謂之馬具装桓尹𫝊輸馬其装百具馬衣謂之馬褐如今鞍帕之類定八年公侵齊攻廪邱之郛主人焚衝或濡馬褐救之杜云馬衣寧我負人無人負我此曹操由中之言也沮渠羅仇虚水胡人也與其兄麹粥事吕光光征河南大敗麹粥勸羅仇反攻之仇曰理如汝言但吾家累世忠孝寕人負我無我負人遂為光所殺羅仇之言可謂君子卒不免死世之小人益以操為信李虚中以人生月日所直日辰干支衰勝王相推人禍福死生百不失一宜於自己禍福尤精可安之矣乃燒水銀為黄金冀不死卒不免於發疽豈靈於人不靈於己耶虛中命術不用生時今之閲命乃并與時参考宜其尤精乃鮮有中者盖李術不𫝊久矣其未死時就𫝊其術者已卒然失之也􅐱生説齊罷歴下守偹而韓信襲之唐儉使虜請和而李靖隨其後攻之􅐱死而唐歸亦命也文帝愛幸鄧通度丞相已困通即赦之武后愛幸張易之戒曰彼南衙宰相来避之文帝之治無可議武后専恣不法亦使之有宰相故亦治宦者趙同數害袁盎兄子種曰君與鬭廷辱之使其毁不用盎乃有刑餘共載之諫温太真為錢鳳所窘始以丹陽尹譲鳳已而行酒以笏擊鳳後鳳雖有言而王敦不聼矣盎畫斬晁錯之䇿未必種不預謀敦之㓙恣太真未必不順之也何自苦如此二吕后謂張良人生一世間如白駒之過隙何自苦如此文君謂長卿曰第俱如臨卭從昆弟假貸猶足為生何自苦如此目送有喜有怒漢髙欲易太子四老人為夀已畢趨出漢髙目送之召戚夫人指眎曰我欲易之四人者輔之羽翼已成難動矣晋文王目送魏舒曰堂堂人之領袖此則喜也漢景帝召周亞夫上目送之曰此鞅鞅非少主臣此則怒也司馬遷載武帝殺鈎弋夫人云女主獨居驕蹇淫亂自恣莫能禁也女不聞吕后耶故諸為武帝生子者不問男女其母無不譴死豈可謂非賢聖哉班固載吕后問宰相髙祖曰陳平智有餘王陵少戅可以佐之安劉者必勃也終如其言聖矣夫二史言聖止此二帝夫不問有罪無罪一切殺之此與桀紂何異遷乃以為聖何哉高帝知周勃之能安劉而不知吕氏之為禍是智足以知其臣而不足以知其妻明者不如此固亦謂之聖何耶兄弟之妻相呼為妯娌見北史崔子愍𫝊欲姊妹為妯娌古呼為姊姒見漢郊祀志長陵女子見神於先後宛若宛若字也先去聲武后之還廬陵王羣臣諫之者多矣后知天下不與己也故卒還之如張文宗之子錫李瑣李昭徳蘓安常軰皆言之惟狄仁傑言尤切中耳其歸也王及善宻賛后乞中宗出外以安羣心螟蛉有子蜾蠃負之細腰物無雌者皆取青蟲教祝之變成己子古今以况乞子為螟蛉爾雅􅝡螉陶隐居注云銜泥竹壁及器物作房生子如粟米乃捕取草上蜘蛛滿中仍塞中以俟其子為粮已破變為己子之説矣蜀本草注云有人候其封穴了壊而看之果有卵如粟在死蟲上則陶注為不疑倪寛為張湯作奏武帝聞之馬周為常何作奏太宗識之令狐楚作太原書記徳宗能辨其所為後皆為名臣然則郡國書奏其可不擇人使為之致仕給半禄自唐如此㑹要永徽元年觧官充侍者依致仕人例給半禄六典倉部門致仕給半禄張曲江論牛仙客不可為尚書明皇乃用以為宰相既用之後知時議不歸乗間問髙力士力士曰仙客本胥吏非宰相器帝忿然曰朕将用康􅈯葢恚言也方帝欲相崔隐甫也謂隐甫曰牛仙客可與諸卿嘗見否對曰未也帝曰可見之隐甫終不詣他日又問對如初帝乃不用明皇逐張曲江而用仙客一時􅄶忿猶可恕既相之而知不為人所與又恐天下皆欺己且問力士素所親信者力士亦不以為然及兩語隐甫而隐甫寕不相不肯一見仙客可以悟而不悟君之治亂自此方分漢匃奴𫝊莽奏令中國不得有二名因使使者以風单于宜上書慕化為一名按公羊𫝊哀公十三年晉魏多帥師侵衛此晉魏曼多也曷為謂之晉魏多譏二名二名非禮也後漢無複名然附𫝊多有之如孔禧二子長彦季彦是也勸人以殺不可也然五王不殺武三思唐室再壊五王皆死其手王重榮不殺朱全忠遂滅唐室而重榮為所圖絶其嗣孫堅勸張温殺董卓温不聼漢室破壊而温亦不免魯直蘭説一榦一花香有餘者蘭一榦五七花香不足者蕙此魯直自以意分蘭蕙也然蕙自是零陵香本草陳藏器云零陵者即薫草一名蕙其言梔子為薝蔔則出酉陽襍俎可信不疑隂陽家以人姓氏分五音甚不可信古因生以賜姓胙土命氏其本不過出於姚姒姬媯嬴之類後世子孫何嘗知所本有賜姓者如漢之劉唐之李有冒姓者如衛子夫有複姓者如歐陽宇文有三字姓者如侯莫陳有養他人之子如後唐之李嗣源者有收棄子如陸羽如此類甚多安能一一協五音哉泥之則可笑如夏侯嬰初為滕公奉車號滕公及曾孫頗尚公主隨外家姓號孫公主故滕公子孫皆為孫氏唐李叔明本嚴氏冐外家鮮于姓巳而乞附唐属籍姓李不知於五音如何推配也元后𫝊王章論王鳳甚切直但不當薦馮野王成帝雖問試為朕求可以自輔者但當云命相者人主之事非臣敢私有論薦陛下當用天下公論所歸者則無嫌矣卒坐此死哀哉張文瓘相髙宗同列以堂饌豐餘欲少損文瓘曰此天子所以重樞務待賢才吾等若不任職當引避不宜减節以自取名張鎰徳宗時以兩河用兵詔省御饌因奏减堂飡錢時不同二公皆是也應劭注漢書成帝生甲觀畫堂云畫九子母不知佛自後漢方入中國安得元帝時已有九子母也其陋可笑顔師古雖破其説不及此論今人辨人從行李之類其言曰整擉葢用捉字後漢中山簡王𫝊宫騎百人稱捉前行注捉音楚角反猶整齊也行户郎反壻稱半子見吐蕃𫝊可汗上書昔為兄弟今為壻半子也婦人書稱兒不名陳平𫝊吕后云兒婦人口不可信然兒與女對恐非婦人之稱猶婦人稱奴奴與婢對廣中女子皆稱婢男子稱奴似為當待制謂之次對見宣宗紀詔待制刑法諫官次對皆以次而對不専待制也五代史李琪言入閣有待制次對官論事則待制専次對矣蔡邕𫝊待制鴻都門下則待制已見於後漢唐之待制不専一所如裴冕賈至待制集賢院董晋待制翰林是也若結銜在下如裴遵慶集賢院待制李邕史館待制之類是也今之上書表奏多用惟陛下財幸雖賈誼有此言然王莽書詞亦用又今之封王建節以鼓吹迎節於閣門謂之迎授權真官拜謂之即真皆見王莽𫝊恐不可用景帝殺臨江閔王燕數萬銜土置塜上王莽掘丁姬塜燕数千銜土投窠中史書如此非志怪也以言禽鳥猶哀憐之人不如也王僧珍生子宋季雅往賀署函曰錢一千閣人少之乃金錢也唐嶺南首領馮子猷入朝太宗問将金幾許來曰一錠上嫌少乃一􅖼船也見朝野僉載新書曰載金一舸僧珍若添一金字馮若曰一船則不嫌矣文帝曰吾久不見賈生自以為過之今不及也武帝曰吾久不聞汲黯之言又復妄發成帝曰吾久不見班生今日復聞讜言武帝之怒不如文帝之謙也世之畫五星者形貎怪異道家塑像亦如此因為考之得於晋天文志凡五星降於地為人嵗星為貴臣熒惑為兒童歌謡嬉戯鎮星為老人婦女太白為壯夫辰為婦人若以此為畫則有所夲矣公卿家譜多古之賢者不肖者皆去之馬揔自謂伏波之裔建銅柱於安南以著其美郭崇韜自謂子儀之後上子儀冢哭之船門曰馬門盖闖字之分也引首而觀曰闖光武渡滹沱河氷合王方慶七月次葉河無舟氷一夕合豈人力也耶古人以放勲重華文命為堯舜禹之名如中候云重華舜名帝系云禹名文命皆非也此言堯舜禹之徳耳又以堯舜禹湯為謚如曰翼善𫝊聖曰堯仁義盛時曰舜淵源通流曰禹雲行雨施曰湯之類皆非也堯舜禹湯四君之名耳譙周以堯為號亦非也𫝊曰陶唐氏有虞氏夏后氏殷人是唐虞者所起之地因以為姓氏所謂胙之土而命之氏也堯舜禹湯則名無疑也諡法世𫝊以為周公所作以予觀之諡堯為𫝊聖諡禹為淵源通流皆後人倣堯禹之事撰成耳若果以為諡則自三代以下未有用此諡者且如周之文武成宣諡也故漢有文武宣成帝若謂史不當書堯舜名則文王昌武王發何嘗不以名書也陶虞為始起之地更無疑唐則封晋也晋詩云有堯之遺風虞則虢之隣也何以知堯舜為名以曰有鰥在下曰虞舜知之也舜在側微時安得有生號死諡也又何以知唐虞為姓孔子云堯年十六以唐侯升為天子知之也正義虞氏舜名舜之為虞猶禹之為夏也顓頊以來地為國號皇甫謐云河東太陽山西虞地也然則舜居虞以虞為氏堯封之虞為諸侯及王天下遂為天子之號此説是也若云禹為王號之名則非也是直名耳何為王號哉髙宗時薛仁貴擊突厥兀珍於雲州問曰唐將謂誰曰薛仁貴突厥曰吾聞薛將軍流象州死久矣安得復生仁貴脱兠鍪見之突厥失色下馬羅拜遁去永泰中郭子儀出入陣中回紇怪問報曰郭令公驚曰令公存乎僕固懐恩言令公即世故我從以来云云今誠存我得見乎子儀免胄見其大酋皆下馬拜以是知威望宿将國之長城虜一見二公而去豈不賢於百戰百勝之師乎今人謂屡説曰暫盖􅓐字也音賛考之荀子問一曰告二曰􅓐節氣見於經史者管子㓜官篇言清明大暑白露大寒南方篇又云小暑漢始以雨水為二月節見月令注處暑之既至螽䖟之既多見國語宋令長以芒種前去官見南史星昏而正中謂之小雪見定之方中注小雪十月中氣見本䟽注斗指甲為雨水指乙為清明指辰為榖雨見初學記大手筆始晋王珣夢人以大筆與之如椽人謂有大手筆事已而有䇿諡之草此非美事不可用齊文宣有大手筆多命徐陵草唐燕許號大手筆此可用也伍胥自郢走吳追者在後至江江上有一漁父知胥之急乃渡胥既渡觧其劍曰此劍直百金以與父父曰楚國之法得伍胥者粟五百石爵執珪豈徒百金劍耶不受陳平亡楚渡河船人見其獨行疑其亡將腰中當有金玉寳器目之欲殺平平恐乃觧衣臝而佐刺船船人知其無有乃止漁父何其賢船人何其無状也病者多疑漢髙遣樊噲攻盧綰既行人有惡短噲者帝曰噲見吾病乃兾我死耳命陳平至軍斬噲武帝幸鼎湖病久已而卒起幸甘泉宫道不治怒曰義縱以我為不行此道耶銜之後卒弃市上官桀為廐吏上常體不安及愈見馬馬多瘦上大怒令以我為不復見馬耶桀曰臣聞聖體不安日夜憂懼意誠不在馬上以為忠三人事相類噲幾不免縱卒死桀見為忠亦繫乎幸不幸耳然桀之對䛕也吳廣為楚假王韓信自立為假齊王曹參為假左丞相淮南王安𫝊人有賊傷后假母者唐李錡養士以錡為假父項羽為假上將軍項籍𫝊㑹稽假守通勾踐賂太宰嚭求和於吳卒滅吳乃誅嚭以不忠於君而外之受重賂與己比周也漢髙與楚戰丁公窘髙祖祖急顧謂丁公曰兩賢豈相厄哉丁公引兵避平楚丁公上謁乃斬丁公以殉以不忠於主使人臣無效丁公此二事可以為賣國無狀者之戒唐太宗賜房𤣥齡黄銀𢃄曰如晦與公同輔朕今獨見公泣曰世𫝊黄銀鬼神畏之更取金帯送其家唐本草注云有黄銀本經不載俗云為器辟惡乃為瑞物始知黄銀自一種銀非金也張敖𫝊貫髙等壁人柏人要之置厠劉向𫝊孝文非臨厠厠臨深處也張釋之傳從行之㶚陵上居外臨厠汲黯𫝊大將軍青侍中上踞厠視之如淳以為溷顔師古從之縱使青不足道武帝待之如此豈君使臣以禮之意耶孟康謂牀之側恐是如此其後云天子欲令羣臣下大將軍以此觀之必不肯自為無禮而欲使他人加敬也漢武雖暴然青實將兵出入加人以無禮而欲其効命於疆場恐無此理崇寕鑄當一錢始於陜西運判許天啟自長安進様烏背赤文請自禁中行用自此盗鑄遍天下不可禁物價踊貴商賈不行冒禁而破家身死者衆後改為當二其弊猶未革乃改為當三其原本於周武鑄大市錢以一當十唐第五琦復踵其法鑄乾元重寳以一代十物價騰踊饑饉相望琦坐是貶天啟不問也漢髙令諸故項籍臣名籍謂之豁逹大度可乎鄭君嘗事籍獨不奉詔可謂賢矣乃逐之至斬丁公則又曰使人臣無效丁公何也漢有弄臣弄兒弄田春秋時有弄馬見子常肅爽馬事紀信乗漢王車以紿楚卒免漢王於難春秋時亦有此定三年楚子在公宫之北吳人在其南子期似王逃王而己為之曰以我與之王必免隨人卜與之不吉公羊成二年晋師還齊侯還繞也晋郤克投㦸逡廵再拜稽首馬前逢丑父者齊頃公之車右也靣目與頃公相似衣服與頃公相似代頃公當左使頃公取飲頃公用是佚而不反逢丑父曰吾頼社稷之靈吾君免矣郤克曰欺三軍者其法奈何曰法於是逢丑父王衍見錢曰阿堵物阿堵如言阿底衍口不言錢故云今人遂謂錢為阿堵不知晋宋間人用阿堵語甚多如𫝊神冩照在阿堵中殷中軍見佛經云理應在阿堵上謝安云何須壁後著阿堵軰劉歆哀帝時校秘書始見古文春秋左氏𫝊大好之後欲立左氏學官博士不肯置對則是左氏漢末方顯也河間獻王𫝊孝景時其學舉六藝立毛氏詩左氏春秋博士則左氏自景帝己見於世列國尚能立學官何為漢庭博士不肯也元狩四年衛青擊匃奴李廣請行武帝以為老不許久乃許之以為前將軍青乃令廣出東道道少回遠廣願居前先死單于大將軍隂受上指以為李廣数竒毋令當單于恐不得所欲其後失道大將軍乃責廣之幕府上簿致廣自殺始廣欲居前青既不聼以東道回遠固辭則又遣之既受上指毋使廣當單于乃責其失道使自殺青真人奴也哉宜乎廣子敢恨殺其父擊傷青也漢武殺文成而曰文成食馬肝死霍去病射殺李廣之子敢武帝又為之諱曰鹿觸死賞罰國之紀綱既己自欺又為人欺何也治生仕宦自是兩途少有俱進者今人出仕之久生理遂廢司馬相如以貲為武騎常侍可謂富矣至病免客逰梁数嵗而歸則貧無以自業家徒四壁自古如此不獨今也晉顧榮宴見執炙者有欲炙之色割炙啗之客問其故曰豈有終日執之而不知其味後榮為趙王倫長史將誅而執炙者為督率救之得免南史隂鏗飲見行觴者因回酒炙以授之坐者笑鏗曰吾儕終日酣飲而執爵者不知其味非人情也及侯景亂擒鏗行觴者救之得免嗚呼一觴一臠心或有吝人情所在死生繫焉以是知桑下之餓夫淮南之守卒効力於患難之際不誣矣有年大有年桓宣時也有者不宜有二公行事不宜有此皆貶也春秋二百四十二年之間豈有止此二三年豐熟哉以是知二公不宜有此也昭元年秦后子奔晉云云國無道而年穀熟天賛之也與此意合綘雍相去不遠晉饑秦輸之粟自雍及綘后子奔晉享晉侯造舟於河十里舎車自雍及綘昭二年季氏有嘉樹韓宣子譽之武子曰敢不封殖此樹以無􅁯角弓之詩唐太宗嘗止樹下愛之宇文士及從而譽之帝正色以為佞人譽樹一也而宣子喜太宗怒亦繫幸不幸耶凡物之怪舉以為聖杜宗𫝊淮南旱民漉漕渠遺米自給謂之聖米李徳裕裴度並禁亳州聖水平子伐莒取郠獻俘始用人於亳社臧武仲聞之曰周公其不享魯祭乎宋人使邾文公用鄫子於次睢之社司馬子魚曰將以求覇不亦難乎今逺方猶殺人祭鬼實二子啟之也哀哉男女皆不可以美稱宋華父督見孔父之妻於路目逆而送之曰美而艶公子鮑美而艶㐮夫人欲通之漢晉人葬多瘞錢往往遭𤼵掘之禍如盗發孝文園瘞錢是也後人偶掘地得錢謂之掘著窖子今之五銖世謂之古老錢皆漢所瘞者唐鍳發掘之後易以楮錢亡者之幸也李景譲始貧治墻得積錢僮僕奔告其母鄭曰士不勤而禄猶災及其身况无妄而得我何堪亟命閉坎賢哉毋也楊虞卿抵淮南委婚幣㑹陳商葬其先貧虞卿未嘗與逰悉所齎助之郭元振在太學家送錢四十萬㑹有縗服者叩門自言五世未葬願假以治䘮元振與之無少吝一不質名字人以未葬其親為言孰不憐之虞卿知有陳商而元振不問其人名氏此尤甚難然元振固是偉人虞卿牛李黨中魁傑亦能及此亦可喜也范文正公使忠宣公往吳中取麥数百石忠宣道遇石延年告貧盡以與之既歸問道中所見曰石貧無以葬文正曰何不以麥與之忠宣曰與之矣父子所見若合符契此其名徳之重為不可企及者唐考功法雖執政大臣皆有考詞亦有賜考者亦有自書其考者髙宗時唐臨自述其考曰形如死灰心若鐡石徳宗時陽城自書其考曰撫字心勞催科政拙明皇講武驪山唐紹坐失軍容當斬引致纛下左右兾其少貸金吾李邈遽𫝊詔斬之帝甚悔見本𫝊郭元振𫝊𤣥宗講武􅌐山既三令帝親鼓之元振遽奏禮止帝怒軍容不整引坐纛下將斬之劉幽求張説叩馬諌乃赦死流新州􅌐山講武盖為戯耳何乃以小失斬近臣紹獨無救者卒死可為不幸耳然李邈奴才豈不能小待以俟覆奏乎紹庻幾可免中書舎人視事閣老壓角江隣幾雜志謂立於褥東北角以唐考之故事舍人初詣省視事四丞相送之施一榻堂上壓角而坐則壓角者丞相為之非閣老也又坐於榻非立於褥也見裴坦𫝊元祐法尚書侍郎資淺者𢃄權字今復遵用唐亦有之楊嗣復不欲越父於陵當國遂為權知禮部侍郎近有侯鯖録載京師上元放燈三夕錢氏納土進錢買兩夜今十七十八日是也乃世俗妄𫝊乾徳五年詔謂時和嵗豐十七十八兩事見太祖録三朝國史國朝㑹要星辰家以十二宫㸔人命不知所本然其來久矣李賀惱公詩云生辰應七夕夫位在三宫杜牧之自撰墓誌云予生於角星昴畢於商為第八宫曰疾厄宫亦曰八殺宫土星在鳥火星繼木星二楊晞曰木在張為角為第十一福徳宫木為福徳大君子救於其旁無虞也王鳳喜杜欽欽在幕府為之謀無不用薦逹名士王駿等救解馮野王王導胡常之罪又繼功臣絶世可謂賢矣京兆尹王章言鳯専權蔽主宜廢勿用以應天變天子感悟召章與議欲退鳯欽令鳯上䟽謝罪文指甚哀太后涕泣不食上少親倚鳯不忍廢復起鳯就位鳯慙欲遂退欽復説以周公雖老猶在京師之䇿鳯遂不退章死詔獄衆寃之欽復説鳯章所坐事宻吏民見章素好言事以為不坐官職疑其以日蝕見對有所言云云恐天下不知章實有罪而以為坐言事也宜因章事舉直言極諫云云如此則流言消釋疑惑著明鳯白行其䇿班固謂欽之補過將美皆此類嗚呼欽之言鳯無不聼方章下獄時能一言於鳯曰章言將軍是耶當改非耶當容之將軍既用欽之䇿留矣豈不可恕一敢言之士以顯將軍之容徳乎方王駿等有罪欽猶能救觧之乃無一言救章坐視其死妻子流離反教鳯誣天下以章非因日蝕直言乃職事得罪耳欽不忠於君不忠於友真奸賊之雄者班固反謂欽能補過將美不當與之同罪然助成王氏之禍豈特張禹哉欽尤不可赦者北斗七星以十二時繫之為人命所属裴令公少時術士云命属北斗亷正將軍云云後見其形出唐退史五星二十八宿降於世為人如東方朔為嵗星斗秤欺慢變易之類皆姦人圖利之所若窮治盡則事必枝蔓此等無所容必為亂非省事之術也史記懐王都盱眙注鄭𤣥曰音煦怡用平聲讀者恐非也豈避廟諱故用平聲讀耶吕后紀定陶戚姬如淳曰姬音怡衆音總稱音基者恐非也婦人之稱乃用姓爾廣雅亦云又十二辰寅時乃音夷注時也音寅者訓恭已見上世俗以正五九月初到官者不視事避之甚無謂也正五九釋氏謂之三長月學佛者不葷食唐髙祖武徳中因下詔禁屠宰自是方鎮禮上多避之以方鎮視事之初須大饗將校既禁屠宰而饗士之禮不可廢也故多不用此三月今州郡雖帥府皆非古方鎮比視事之初未嘗大饗士又本朝於此三月無屠宰之禁則視事何為而不可若州縣官又何疑焉在朝職事官除授有今日下供職亦未聞有敢避者何獨在外敢􅁯哉死馬醫自唐已有此語傳燈録雲門舉揚亦用此語其初出郭璞𫝊有主人良馬死者璞教令一人東行過林木以杖擊之得一物如猿持歸見死馬即吹其鼻少頃活故養馬家多畜猿為無馬疫世俗無可柰何尚欲救之者謂之死馬醫附子烏頭天雄一種也蜀人以小者為烏頭中者為附子大者為天雄按廣雅云附子一嵗曰側子二嵗曰烏喙三嵗曰附子四嵗曰烏頭五嵗曰天雄則是烏頭比附子加一嵗矣不得為小也見廣韻数名卅音颯卌音靸先立切卄音入今直以為二十三十四十字不知音各不同史記魏相𫝊載長安中有善相者田文與韋丞相魏丞相邴丞相微時㑹於客家田文言曰今此三君皆丞相也其後三君皆相代為相唐方技𫝊載張璟藏善相姚崇李逈秀杜景佺從之逰璟藏曰三人皆宰相姚最貴已而果然髙智周與來濟郝處俊孫處約同逰揚州石仲覧𫝊舍引以見相工工曰四人皆宰相也石氏不及見郝来見貴而末塗屯躓髙晩逹最夀速登者易顛徐逹者少患天之道也後皆如相工言東齊記事載本朝張鄧公㓂萊公張齊賢王隨同詣卜肆卜者驚以為皆宰相亦何見之明也韓莊敏少時與吳冲卿王禹玉同詣天禄山人卦舖二人推莊敏先㸔命云己未七月九日生禹玉驚云怎早知珪命莊敏云此是僕命又云甚時莊敏云寅時禹玉云某是午時天禄皆云極貴寅時不作員外郎莊敏便作御史丞臺為司封郎中不作員外郎三人皆宰相見韓莊敏遺事漢石經靈帝時蔡邕與堂谿典楊賜馬日磾正定六經文字邕書刻石立太學門外北史劉芳𫝊漢造石經於太學學者文字不正多往質焉號劉石經唐石經文宗時鄭覃以宰相兼祭酒建言乃表周墀崔球張次宗孔温業等是正其文刻於石見本𫝊晋恵帝時裴頠奏修國學刻石寫經本朝石經胡恢所書凡布物多曰争布綱曰争綱布紙曰争紙合用繒字楚世家繒繳蘭臺徐廣云繒繋也音争世以射一箭為一發非也射畢十二箭方為一發一發五豝非一箭射五豕也十二箭乃能射五豕耳退之作薛助教誌云三發連三中的亦誤也荀子注六馬仰秣引白虎通天子之馬六今之白虎通無此言縁本朝求書有賞往往多自撰以求賞非古書也如竹林玉杯繁露皆後人妄言非仲舒當時書以天子六馬推之則諸侯五馬無疑郡守如黄覇或十年二十年不徙唐韋臯治蜀二十餘年張建封治徐十年李自良治河東九年葢久任之效也俗以富為鄒不知何義亦不知用何字頃在泗上見一老書生云俗子相與為隐語耳富而好禮孰謂鄒人之子知禮乎是富而不知禮也此説亦可取帯濶狭以道言當用稲字五代劉旻以十二稲玉帯遺漢髙祖骰子采有渾花見徐温𫝊與劉信博斂骰子曰信茍無二心當成渾花一擲六子皆赤飲酒而泣曰酒悲見王衍𫝊宗夀言發而泣韓昭華曰嘉王酒悲江左臣下奏事用啟如法帖中王僧䖍南臺御史帖前云臣僧䖍啟後云謹啟今若施於平交則必大怒以為簡惟問候外幅則用之非情也故内簡必頓首再拜而後可稍重則加上覆又重則易再拜為百拜且加惶恐字古者簡牘取簡便今必十幅不情無甚於此孝文時吳太子入見侍皇太子飲博吳太子師傅皆楚人輕悍又素驕博争道不恭皇太子引博􅈰提吳太子殺之吳王濞因此反宋伐曹戰於乗邱魯生虜宋南宫萬宋人請萬萬歸其後宋湣公與萬獵因博争道湣公怒辱之曰始吾敬若今若魯虜也萬有力病此言遂以局殺湣公於蒙澤魯勾踐與荆軻博争道勾踐叱之軻遁去博所以為樂殺人召禍如此可戒也夫曹操召禰衡為鼓史云云吏曰鼓史何不改装而敢輕進乎衡曰諾於是先觧袒衣裸身而立徐衣岑牟單絞而著之操笑曰本欲辱衡衡反辱孤世説齊王冏為大司馬稽紹為侍中因㑹葛旟等曰侍中善絲竹公可令操之遂送樂器紹不受曰不以先王之服為今人之業今逼髙命不敢辭當釋冠冕襲私服旟等不自得而退二子相類然禰衡之狂不如紹之從容也賈誼云人主之行異布衣後漢董宣為洛陽令殺陽城公主蒼頭光武大怒召宣欲殺之云云主曰文叔為白衣時藏亡匿死吏不敢至門今為天子威不能行一吏乎帝笑曰天子不與白衣同文帝却千里馬不受光武以千里馬駕鼓車却而不受馬猶得以盡其材以駕鼓車則抑之甚矣馬何罪哉光武之矯不若文帝之誠潮州舊有韓文公祠紹興十年教授劉元諭以其地狹隘欲大之請於郡乞徙於他所郡從之工畢卜日遷神像元諭拜伏不起作中風状扶歸口鼻流血死郡守皇恐不敢遷卒毁新廟堂神不欲遷耶抑其死偶然耶何暴也退之作羅池碑云過客李儀慢侮殿上扶出廟門即死且云死能驚動禍福之其意不以子厚為然也退之数百年後乃殺一教官侮慢被罰猶之可也欲新大廟貎而死酷哉退之暴甚子厚矣相形家以人形如物者佳班超虎頭燕頷何尚之真猿之類是也人生又有為物之精者如杜預以蛇精郭璞鼍精肅宗為儋耳龍禄山為猪龍郭見李翼文選注天地之間人最貴乃為異物之精又以形貎聲音似鳥獸為貴何也至於比徳則又以麟鳯龍虎騏驥之類為説又何耶杜預自表營首陽之南為將來兆域取制於邢山鄭祭仲之墓陶淵明自作挽辭自祭文杜牧之白樂天辛秘李棲筠王績嚴挺之桞子華皆自撰墓誌盧照鄰李適司空圖自作墓誌衛大經自鑿墓自為誌顔魯公在蔡州度必死乃作遺表墓誌祭文謂之達亦可謂之近名亦可處死若魯公可也孝平皇后莽女自劉氏廢常稱疾及漢兵起誅莽燔未央宫后曰何面目以見漢家自投火中死愍懐太子妃王衍女字恵風劉曜䧟洛以恵風賜其將喬屬恵風㧞劍拒屬曰吾太尉之女太子妃義不為逆胡所辱屬遂害之朱全忠兄全昱全忠將受禪有司偹禮全昱顧太祖曰朱三汝作得否與全忠飲博取骰子撃盆而迸之呼全忠曰朱三爾碭山一百姓遭逢天子用汝為四鎮節度使何負於汝而滅唐家三百年社稷吾將見汝赤其族矣漢之公卿有愧於此女晋之公卿有愧於此妃唐之公卿有愧於此兄世多用陽春白雪為寡和本䖏云陽春白雪属而和者数十人引商刻羽雜以流徵属而和者十数人其曲彌髙其和彌寡則乂陽春白雪未為寡和而引商刻羽乃為寡和也世云太公八十遇文王東方朔客難云太公體仁行義七十有二設用於文武注云九十封齊則是遇文王時未八十時也楚詞九辨云太公九十乃顯榮言封齊時也男曰人臣女曰人妾臣妾對君上之稱男女之别也今婦人奏狀則曰臣妾某氏是以婦人兼男子之稱也男曰奴女曰婢故耕當問奴織當問婢今則奴為婦人之美稱貴近之家其女其婦則又自稱曰奴自漢以前婦人皆稱妾如妾得無從坐柰何妾薄命之類是也兼臣妾而言不知起何代古者婦人女子亦有名字如孟光字徳曜曹昭字恵班之類是也一例稱奴起於近代退之云韓與何為同姓廣韻何字注云周成王母弟唐叔虞封於韓韓滅子孫分散江淮晋以韓為何字隨音變遂為何氏牽牛牛星也織女非女星自有女星織女三星在牛之上主金帛女四星在牛之東是須女也須女之賤稱詩人往往誤以織女為牛女子美云牽牛出河西織女䖏其東亦誤矣毛寳白龜蒙求引搜神記以為投江獲龜救者寳晋書以為養龜人竊香者賈充之女非韓夀也皆當以𫝊為正蒙求以教小兒其誤如此漢武東封還兒寛上夀曰敬舉君之觴巫蠱事起田千秋上夀則曰敬不舉君之觴意適故能飲巫蠱起非上夀時也彈曲始於唐懿宗時曹確𫝊云優人李可及能新聲自度曲號為拍彈優伶打顐亦起於唐李栖筠為御史大夫故事曲江賜宴教坊倡顐雜侍栖筠以任風憲不往臺遂以為法顐力困切弄言也江南病疫之家往往至親皆絶迹不敢問疾恐相染也藥餌飲食無人主張往往不得活此何理也死生命也何畏焉使可避而免則世無死者矣然此事其來已久晋王彪之𫝊云永和末多疾疫舊制朝臣家有時疫染易三人以上者身雖無疾百日不得入官國家且如此况民間乎此令一下至今成風不仁哉人臣仕於朝其可一日不見君謨謀輔弼之臣使百日不入見其為國也亦踈矣哉李陵以歩卒五千横行匃奴樊噲願得十萬衆横行匃奴楚破秦軍項羽見諸侯將入轅門皆膝行而前莫敢仰視彭越誅失期最後者一人属徒不敢仰視蒯通説韓信畧不世出伍被𫝊淮南王曰蓼太子畧不世出東坡黄州謝表云天地能覆載之而不能容之於度外父母能生育之而不能出之於死中至今膾炙人口盖用後漢書袁敞𫝊張俊語曰天地父母能生臣俊不能使臣俊當死復生第五倫守㑹稽有妄屠牛者吏輒行罰州郡禁屠牛始於此晋元帝時丁澤書云殺牛有禁買者不得輙屠朝廷禁屠牛始於此唐僕射者師長百寮開元時為左右丞相雖去幾務總百司署位不著姓上日班見百官見王璠𫝊署位不著姓今猶遵用去幾務猶總百司真宗朝以前判都省皆如此自後宰相罷則去不復留總百司若上日班見百官之禮廢已久矣唐宰相開延英時皆坐論事今常朝奏事立語而退非謝辭賜宴未嘗坐也勢利所在雖死不􅁯賢者猶不免况餘人乎亷頗善飯馬援據鞍瞿鑠李靖雖老尚堪一行皆為是也後漢戴封為西華令大旱積薪坐其上自焚火起而雨凉輔為廣漢掾太守禱雨連日無所得輔自暴庭中祝曰云云輔今敢自祈禱積薪聚茭茅自環發火其旁將自焚未及日中澍雨沾足近世浮屠氏多為自焚祈雨以惑人不知自古士大夫已如此不可専罪浮屠也世𫝊某縣有尉夜半撃令門求見甚急令曰半夜有何事請俟旦尉曰不可披衣遽起取火延尉入坐未定問曰事何急豈有盗賊竊發君欲出捕不可失時告行耶曰不然豈家有疾病倉卒耶曰不然曰然則何為不待旦曰某見春夏之間農事方興百姓皆下田又使養蠶恐民力不給令笑曰然則君有何䇿曰某見冬間農隙無事不若移養蠶在冬為兩便令曰君䇿甚善古人不及柰冬無桑何尉瞠目不對久之拱手長揖曰夜已深伏惟安置予来嶺表見一嵗三蠶葢冬桑不凋故蠶可養十月盡猶簇繭則知尉之䇿未必不善而令之笑止可行之中原古有氷蠶唐尹思正刺青州蠶四熟以是觀之不必専在春夏之交也近世儒者以夢卜事為神聖人姑託之於此傅説太公未遇時髙宗武王知之久耳特以夢卜事為神非真以夢卜求相也起於草萊之中加之卿相之位恐人不信故託此耳如此則是聖人為偽孔子刪書亦存偽以教天下耶大抵古者淳風未散人人有士君子之行在版築漁釣之間者其素行己皆服人而聖人精誠之至與天相通故或以象求之或以卜得之其賢决矣未嘗致疑不為是委曲作偽事也孔子刪書如鳯凰来儀禾則盡起雉雊鼎耳妖祥皆實未嘗存偽也范睢一見秦王田千秋一見漢武皆遂以相與夢卜何異後人無至誠之心日為自欺及欺人之事耳目聞見狭小故疑夢卜為容易可發一笑梁武䇿錦被事咸言已罄試呼問劉峻峻䟽十餘事坐客皆驚帝不覺失色自是惡之不復引見其後又問䇿事多少與沈約更䟽所憶少帝三事約出曰此公䕶前不譲即羞死帝以其不遜將抵罪徐勉諫乃止以是知文帝自謂不及賈誼賢矣漢武末年悔用兵封丞相為富民侯其詳見渠犁城𫝊云師行三十二年海内虚耗征和中李廣利以軍䧏匃奴上既悔逺征伐桑宏羊與丞相御史奏欲田輪臺以東云云乃下詔深陳既往之咎云乃者貳師敗軍士死畧離㪚悲痛常在朕心今請逺田輪臺欲起亭隧是擾勞天下非所以優民宏羊不足道也田千秋身為相豈不知美意而奉承之乃更以田輪臺為請盖千秋以妄男子上書旬月取宰相恐至意怠故以用兵勸之為固位計耳前後為相者皆誅獨千秋免豈武帝悔殺相之多如悔用兵耶不然欲擾天下之罪比諸公大矣光武令尹敏校圖䜟敏曰䜟書非聖人所作其中多近鄙類世俗之詞恐疑誤後生帝不納敏因其缺文増之曰君無口為漢輔帝怪之問其故敏曰臣見前人増損圖書敢不自量竊幸萬一帝深非之竟不罪敏始言䜟非而帝不納卒就其職是知其不可而不能固辭己可罪又増損其文竊名其間以幸富貴謂之滑稽玩世亦可謂之狂誕亦可謂之托此以風亦可光武所以不罪敏豈一問而首服為可恕耶抑心知圖䜟為世俗所増損如敏者甚多姑欲遂非耶然敏所以校圖䜟者抑有由矣盖敏之初上䟽首陳洪範消災之術豈非其言近䜟乎洪範所陳王道之正也未嘗専用消災設也予嘗謂士之始見君其言不可以不謹孟子初見梁恵王陳仁義不雜他術終身守之豈若説以帝道不入説以王道又不入説以覇道者耶桓譚論䜟意與敏同及出為郡忽忽不樂道病卒葢是悔其言之不直也不得其言則去亦是常理何至憂戚殞生是以君子論事君前先决禍福死生不悔而後可不然斯已矣范滂等非訐時政太學生争慕之申屠蟠曰昔戰國之世處士横議列國之王至為擁篲先驅卒有坑儒燒書之禍今之謂矣乃逺迹梁碭之間居二年滂等罹黨錮或死或刑蟠確然免於疑論景毅子顧為李膺門徒不及於譴毅慨然曰本謂膺賢遣子師之豈可漏脱名籍茍安而已遂自表免歸蟠有先見之明毅有不茍免之義皆合於士君子之行論事太直非特不聼從而增益之過於未論時光武見桓譚䜟書之非其後論靈臺則謂譚曰吾欲以䜟决之唐明皇一見人論牛仙客不可用則曰我且用康􅔝音辯盖􅔝人才尤不為人所取故也懿宗見論佛骨之禍則曰吾得生見之死不恨敬宗見論幸驪山之禍則曰吾且往識汝言故人親戚一日貴顯能不􅁯舊者少然不可以舊分望之盡禮焉可也故人侮陳勝卒斬之馬援以父友不禮梁松卒遭其陷此援之過也漢交阯女子徵貳徵則反擾嶺外六十餘城唐睦州女子陳碩貞反破睦歙二州女子能作賊可怪也夫雨立二優旃汝雖長何益幸雨立楼䕶𫝊反雨立閭巷婦人笑躄二晋侯使郤克徵㑹於齊齊頃公帷婦人使觀之郤子登婦人笑於房郤子躄故也平原君家楼臨民家有躄者槃散行汲美人居楼上大笑之不窺園三董仲舒三年不窺園後漢桓榮十五年不窺園魏閔謙𫝊趙昱歴年不窺園本朝御史資淺者為裏行唐有尚書裏行太宗時張昌齡敕於通事舍人裏供奉肅宗時元結為監察御史裏行夲朝因之雙生昭十一年泉丘人有女生懿子及南宫敬叔注似雙生僖十七年梁嬴孕過期卜生一男一女唐王仁皎子守一與𤣥宗廢后孿生孿音所眷反賜畫像贊者明皇時張説康子元陸堅賀知章龔遂治渤海王生曰天子即問卿治渤海君不可有所陳對宜曰皆聖主之徳非小臣之力上果問以治狀對如王生言天子説其有譲笑曰君安得長者之言而稱之王濬每進見陳伐吳之功見枉之狀不勝憤徑出不辭范通曰卿功則美矣恨所以居美者未盡也卿旋斾之日角巾私第口不言平吳之功有問者輙曰聖主之徳羣帥之力老夫何力之有三軍能無愧乎龔遂能用王生之言王濬不能用范通之䇿豈識有明不明耶善則稱君過則歸已濬不知此斯謀斯猷惟我后之徳遂得之矣山濤𫝊袁毅為鬲令貪濁以絲百斤遺濤濤藏於閣毅事發凡所受賂皆見推檢取絲付吏印封如故段秀實自邠被召戒其家曰若過岐朱泚必致贈遺慎毋納至岐泚因致大綾三百家人拒不遂至都秀實怒曰吾終不以汙吾第以置司農治所之梁間吏後以告泚取視其封帕完新崔祐甫妻王陷朱泚賊中泚嘗與祐甫同官贈以縑帛菽粟受而緘鐍之徳宗還京具封以獻桓冲傳苻堅舉國内冦嘆曰謝安有廟堂之量不嫻將畧陳夀評諸葛亮應變將畧非其所長亮决三分之計終身中之其見明也其後言奨率三軍北定中原然兵止於五丈原而不出者乃所以自守其將畧也何名為非所長哉苻堅出師舉國以為不可堅違衆而出天理人情皆已逆矣安知其不足懼一遣其姪遂成破竹之功此將畧也何名為不嫻哉冲私憂過計夀真私意也夀嘗為亮子瞻所辱耳諸葛木牛之制見於注劉晏之孫濛宣慰靈夏始議造木牛運南史祖冲之造千里船不因風水施機自運亦因木牛流馬之制賣僧道度牒見唐裴冕𫝊肅宗在靈武冕建言賣官度僧道士收貲濟軍興時取償既賤衆不為宜裴遵慶以尚書右僕射復知選以老聼就第注官張説致仕修史於家明皇以張説為大學士説曰學士本無大稱中宗寵大臣乃有之徳宗以李泌為大學士泌言學士加大始中宗時張説固辭乃以學士知院事崔圓為大學士亦引泌為讓而止鄧景山為淮南節度使有鼉集城門鄧班謂景山曰鼉介物也失次金不從革之象其有兵乎未幾劉展反宣和己亥都城北小民家晨起見一物如龍伏牀下大驚都人争往觀之禁中取去騐之鼉也杖殺之城北去水遠不知所從來已而大水又数年有金人之禍鄧班之言不獨騐於當時又騐於後漢髙誅彭越盛其醢徧賜諸侯唐肅宗殺中人馬尚言以其肉賜從官見吕諲𫝊有罪殺之可也賜醢賜肉甚矣二主意将戒有罪然黔布一見醢遂定反計李輔國専制肅宗遷明皇南内以憂死肅宗不得盡孝道葢見賜肉之過也刑賞貴中過則人必不服用人若得才實雖親故何嫌漢髙之起皆蕭曹故人光武中興亦南陽多顯者唐崔祐甫為相除吏八百多親舊皆得實所以致建中之治李綘引此事以諫憲宗又許孟容𫝊綘曰忠臣事君不以私害公設有才雖親舊當用避嫌不用乃臣下身謀神䇿軍使王駕鶴典衛兵久權震中外徳宗將代之懼其變以問崔祐甫祐甫曰是無足慮即召駕鶴留語移時而代者已入軍中徳宗以來姑息藩鎮有終身不易地者李吉甫相憲宗嵗餘易三十六鎮殿最分明二公所以敢易權臣使之聼命者葢自恃其公正才畧足以服人耳孔子所謂其身正不令而行也比之周勃入北軍則為省力然産禄之根連太后非駕鶴輩比也唐宰相奏事皆坐闗播𫝊播避坐欲有所言是也本朝不坐惟賜燕辭燕則賜坐皆候奉事罷也講筵臣寮則皆賜坐當講讀者則起至扆前立講餘不起立立罷復坐賜茶而退龎統力勸昭烈襲取劉璋帝用其中䇿斬楊懐髙沛還向成都其計效矣帝至涪置酒作樂謂統曰今日之㑹可謂樂矣統曰伐人之國而以為樂非仁者之兵也伐人之國本出其謀置酒為樂乃曰不可豈人情也哉不仁之大莫大於襲璋統不以為非一醉之樂反以為言豈欲避本謀而以此言滅迹耶抑能為大惡而行小善也歟宋襄公不禽二毛何以異裴松之謂逹義成功本由詭道心既内疚則歡容自戢且謂帝有非而統無失是為統文過也漢文恭儉不能禁庶人之文綉被屋壁倡優僭后飾楊綰清儉乃能使郭子儀减音樂宰相能化人人主不能化天下何也化天下當以誠帝使鄧通得自鑄錢是豈欲天下之人趨儉哉綰之清有素矣朝士大夫舉知之矣一旦為相從之而化宜也王琚佐明皇平内難眷待特異預大政事號内宰相陸贄在奉天徳宗倚信雖有宰相主大義而贄常居中㕘可否號内相杜黄裳婿韋執誼輔政黄裳為太子卿請太子監國執誼曰公始得一官遽開口論禁中事黄裳曰吾受恩三朝豈以一官見賣即拂衣出盧把薦闗播為相論事帝前播意不可避坐欲有所言把目禁之退曰以公謹畏故至此柰何欲開口論事耶播懼不敢復言黄裳唐為賢相闗播為盲宰相視此可見朱敬則為史官權重宰相韋貫之云禮部侍郎權重宰相憲宗曰侍郎是宰相除安得重貫之曰然為陛下柬宰相者得無重乎漢夏侯勝或見時謂上為君誤相字於前宣帝以是稱重之段平重對徳宗謬稱名帝斥去之二君賢否即此可知進士私謂為同年見許孟容𫝊李綘與孟容弟同舉進士為同年云云綘曰進士明經嵗百人吏部得官至千人私謂為同年夲非親舊也南史范縝因竟陵王子良信釋氏縝盛稱無佛阮瞻著無鬼皆有所激而云崇寕乃南史明宣太后陵名也蔡元長改建中靖國為崇寧以表紹述熈寧政事不知以陵名為年號當避也當時一朝士大夫豈盡不知耶抑知之而不敢言也李揆取士不禁挾書大陳書於庭多得實才和凝知舉徹棘圍大開門士皆肅然無譁上下相應故可書今為二公之所為則不成禮闈矣予在史館讀真宗實録雄州言頃年契丹加兵女真女真衆才萬人所居有灰城以水沃其壁凝凍成氷距城三百里焚其積聚其人散居山林以待之契丹至則城不可破野無所取遂退兵女真即出襲敗之殺傷甚衆今契丹移遼陽城言征髙麗且渉女真之境女真衆雖少契丹必不能勝仍圗畫以獻契丹以西楼為上京遼陽為東京在中凉正東稍南又云契丹習俗既葬必守墳或云國王欲守其母墳聲言征髙麗駐遼陽城也上謂王旦等曰契丹征髙麗萬一髙麗窮蹙或歸於我或來乞師何以處之旦曰當頋其大者契丹方固盟好髙麗貢奉屡嵗不至上曰然可諭登州待其釁如髙麗有使來乞師即語以累年貢奉不入不敢逹於朝廷如有歸投者第存撫之亦不須以聞宣和間女真遣使海上結約夾攻大遼遂起燕山之役是時未有一人以此告於上者北人食麫名餺音博飥音托揚雄方言餅謂之飥齊民要術青䴹麥麫堪作飯及餅飥甚美磨盡無麩則飥之名已見於漢魏五代史李茂真𫝊朕與宫人一日食粥一日食不托不托俗語當以方言為正作餺飥字本朝父子作狀元者三家安得裕與其子守亮梁顥與其子固張去華與其子師徳其後狀元之子登科者極少且以經義改科終道君朝狀元考之無一家有子登科者葉祖洽余中徐鐸時彦黄裳焦蹈李常寧馬涓畢漸何昌言李釜霍端友蔡嶷賈安宅莫儔何臬王昻何渙沈晦十九榜六十餘年俱無子登科豈天以大名已付其人而其後不可復得耶又祖宗時大魁多為相此十九榜為相者一何臬而已椀盞盤合見齊民要術種榆鏃作獨樂及盞十年之後魁椀瓶榼無所不任種楸盤合樂器所在勝用盌字見南史沈炯𫝊茂陵玉盌遂出人間故杜詩云早時金盌出人間江子一就梁武求觀秘書李邕見李嶠願一見秘書南史張纘欲徧觀閣中書籍求不得為秘書郎三載方遷薛宣為相朱雲往見之宣偹賔主禮留雲宿從容謂雲曰田野無事且留我東閣可以觀四方竒士雲曰小生乃欲相吏耶顔師古注言欲以我為吏東坡詩云薛宣直欲吏朱雲用師古註也以上文考之宣無欲吏雲之意相吏恐當作相形字去聲讀宣欲使雲觀四方奇士意欲使之求人材用耳雲不能為宣擇材乃曰小生乃欲使我相吏雲無意於世久矣豈能更代宰相觀人材乎錢以文言南史武陵王煜華林園射賜錢五萬文絹帛以匹言姚察門生遺花練一匹史裴䆳納絹二匹藕以挺言南海王子罕取一挺藕㯽榔以口言任昉餌㯽榔剖百口許不得好者簟以領言世説王佛大見王恭坐六尺簟可以一領與我浙中諸堰以牛車舟而過顧憲之𫝊云始立牛埭以風濤迅險人力不㨗濟急以利物堰始於此太守雙旌事見唐百官志節度使賜雙旌韓退之易為兩旗侯之􅊑號兩旗是也周昌相趙王如意如意為吕后鴆死昌謝病不朝三嵗而薨賈誼𫝊梁王勝墜馬死誼自傷為𫝊無狀哭泣嵗餘亦死二公可謂死職矣淮南厲王罪惡暴著文帝屡赦之巳得親親之意矣王卒不改行乃處之於蜀道非殺之也袁盎乃以殺弟名動文帝王既以不食死盎乃建議斬丞相御史以謝天下嗟乎盎忍人也文帝又封厲王四子為侯賈誼䟽諫曰淮南王悖逆無道天下孰不知其罪陛下幸而赦遷之自疾而死天下孰以王死之不當今尊奉罪人之子適足以負謗於天下此人少壯安能􅁯其父哉雖割為四四子一心也方厲王死時惜乎誼不在文帝之左右其後厲王二子果以謀反自殺如誼言韓安國坐法抵罪蒙師古註梁國之縣獄吏田甲辱安國安國曰死灰獨不復然乎甲曰然則溺之後安國為梁内史甲亡安國曰甲不出我滅爾宗甲肉袒謝安國卒善遇之李廣得罪為庶人屏居藍田山中夜歸㶚陵尉醉呵止廣廣曰故李將軍尉曰今將軍尚不得夜行何故也宿廣亭下後廣為右北平太守請尉與俱至軍斬之士方失意時為庸人孺子所侮慢多矣安國能忍廣不能忍其度量相逺如此炎凉世法也當以安國為是廣犯夜尉守法尉亦賢矣廣後為將軍當取而用之宜必得其死力乃挾舊怨無罪而戮士何以為將此廣不侯之一也李適之為相與李林甫不協林甫謂適之曰華山生金采之可富國適之為帝道之帝喜以問林甫林甫曰臣知之舊矣華山陛下本命王氣之舎不可穿冶故不敢聞帝以林甫為愛己而薄適之杜甫封西嶽賦云主上本命與金天合則是華山為𤣥宗本命所直之方人間皆知之適之為相獨不知耶信巫卜之数𤣥宗已失人君之大度采金於山亦非宰相富國之方古者朋友有義非若今之専勢利如桞子厚墓志所云者李陵降匃奴武帝戮其妻子而司馬遷㑹召問訴其寃至下獄而其説不變陳湯斬郅支功大矣一為匡衡石顯所沮其賞不行劉向上書申理元帝卒封侯賜金衡銜前事復以盗康居財物等事奏免之又坐言康居王侍子非王子下獄當死谷永上䟽訟湯成帝即出湯奪爵為士伍又為王商所譛奏以惑衆不道非所宜言廷尉趙増夀議無惑衆之罪正坐非所宜言免湯為庶人徙燉煌燉煌太守奏湯前親誅郅支威行外國不宜處邊徙安定議郎耿育訟湯乃還湯京師觀向永育三人之言皆切直稱湯功甚偹痛讒嫉甚深衡顯百計卒不能殺此三人力也元成帝時漢道已衰公論猶有所伸如此武帝怒陵降是已不能存其妻子以湏陵所為遽殺之亦忍矣遷縱為陵游説亦無大過下蠶室虐哉爾雅妻之父為外舅母為外姑今無此稱皆曰丈人丈母桞子厚有祭楊侯事丈人獨孤氏丈母則知唐已如此莊子寓言然有不可知者其言人生馬之類尤為物化之怪晋愍紀人生馬則實有之矣非寓言也今在職許稱前官著為令家語胄子雖遷爵易位而班級不及其故者得以故官為稱富鄭公使北争獻納二字甚切後之議者以為二字不必苦争孔子適季孫季孫之宰曰君使求假於田將與之乎孔子曰吾聞君取於臣謂之取與於臣謂之賜臣取於君謂之假與於君謂之獻季孫悟遂命其宰自今往君有取之一切不得復言假也鄭公力不肯言獻以此也夫然非博學通古今其可出疆専對乎今銓格年二十以上方許出官州縣官以三年為任皆江左法也宋文帝元嘉中限年三十而任州縣以六周而代刺史或十餘年孝武仕者不拘老少守宰以三周為滿齊謝超宗議云云習宋代限年之制甲族以二十登仕陳依梁制年未三十者不得仕見通典渡子覔錢古有之列子人有濵河而居習水勇於泅􅍾舟鬻渡利供百口六曹尚書讀作平聲非也尚訓上上書爾如尚公主之類監當讀側聲者非也當管此事耳箕踞人多為説皆不甚詳攷曲禮曰坐毋箕踞為其不敬也唐子西箕踞軒記云箕踞者山間之容也拳腰聳肩抱膝而危坐傴偻跼蹜其圓如箕又曰其勢如蹲猿如投竿而漁以予攷之惟注云伸兩足者為是葢古者坐於席無今之椅凳之類故坐則跪行則膝前是足向後也傳曰跪坐以進之以是坐則跪也故以是為敬若伸兩足則手據膝故若箕狀箕踞乃不對客之容若孔子所謂燕居申申夭夭者若傴偻跼蹜則是畏懼不敢肆之貎不得為不敬也今人坐于椅榻之上猶欲箕踞不可得也自後漢猶皆坐席上如戴馮重席是也千里駒不特漢晋事如梁王茂丘仲孚王規後魏袁躍後周張䖍威北齊崔昻楊愔父常曰此兒駒齒未落已是我家龍文更十嵗後當求之千里之外生祠始於定國之父郡中生立于公祠後漢潜山人生立白馬陳從事祠陳衆也廣都韋祠巴郡王堂九真任延武威張奐晋之廣中丁綰池陽令杜軫梁何逺令武康守宣城及新興内史皆立生祠齊新安伏晅唐義新軍袁滋潭馬殷吳越錢鏐靈州韓逖滑稽古今説不同揚子雲酒賦云鴟夷滑稽腹大如壺應劭註史記鴟夷革是以皮為酒榼崔浩漢記音義云滑稽酒器也轉注吐酒終日不已故語言響應無窮者取象今之注子是其遺法殿學士六朝時已置此官陳姚察為嘉徳宣明二學士宋劉徳願孝武殷妃薨與羣臣至墓謂徳願曰卿哭貴妃若悲者當加厚賞徳願應聲號慟撫膺躃踊涕泗交流帝甚悦以為豫州刺史與羊元保棊勝得宣城李存朂博勝得盧龍節度何異嶺外有果名撚子三月開花如芍藥七八月成實可食結腸胃小兒食多則大便難東坡改名海漆言搗其葉可代柿漆用嶺表録異云倒捻子窠叢生葉如苦李花似蜀葵小而深紫南方婦女多以染色子如軟柿上有四葉如柿蔕食其心其蔕故謂倒捻子或呼為都念子語訛也其子外紫内赤無核食之甜美暖臟益肌肉古訛捻為念今又訛念為撚大業拾遺記南海送都念子樹一百株付西苑十六院種即此花也嶺表有竹俗謂司馬竹又曰私麻竹南越志曰河麻竹可為弓似弩謂之溪子弩或曰蘓麻竹今記為司馬竹嶺表録異云河麻大如茶盌厚而空小一人擎一莖堪為椽梁正此竹也又有勒竹者棘之訛也竹譜曰棘竹生交州諸郡藂生竹厚實夷人以為弓枝節有棘異物志云種為藩落卒倒根出大如十石物縱横相承狀如繰車一名笆竹筍味落人鬚鬢録異云南土有刺竹南人呼刺為勒自根横生枝條展轉如織野火止能燒其細枝嫩葉春色轉宻邕州以為墻蠻蜑不能入石栗出韶之仁化他䖏無也嶺表録異云廣州無栗惟勒州此州恐傳誤冩有石栗一年方熟皮厚而肉少味似胡桃仁熟時有羣鸚鵡啄食畧盡亦甚稀少嶺外風俗多服毒藥㫁腸草以死誣人多死於所誣之門常怪其愚如此南州異物志曰廣州俚賊若隣里負其債久不還者子弟取野葛一錢鉤吻数寸許到債家門食而死誣債家殺之債家懼以物辭謝多数十倍死家乃收尸而去不以為恨則此風舊矣鉤吻即㫁腸草又名胡蔓嶺表録異記云野葛俗呼為胡蔓蔓生如蘭香光而厚置生菜中毒人用羊血觧羊食之肥大今之縣邑曰縣道恐不宜連稱縣自縣道自道也按孝文紀養老令云有司請令縣道顔師古注曰或縣或道有蠻夷曰道用驢磨麵見六朝袁淑俳詩文驢山公九錫云嘉麥既熟實湏精麵負磨囘衡迅若轉電酒家揭帘俗謂之酒望子見韓子宋有酤者斗槩甚平遇客甚謹為酒甚美懸幟甚髙而酒不售遂至令酸以狗惡也用納音㸔命見則天時唐尚獻甫則天時太史令奏云臣本命納音在金熒惑犯太史熒惑火也火能尅金臣将死之果然隂陽家用隂徵亦見則天時嚴思善占熒惑犯輿鬼則天問之曰商姓大臣當之其年文昌左丞相王及善卒若吕才則不取五姓納音同年生災福有相類者武元衡與李吉甫齊年同日為相同出鎮同再入相吉甫先一年以元衡生月卒元衡後一年以吉甫生月卒漢髙改婁敬姓劉云婁者劉也往往以笑髙祖臆撰説文貙膢祭飲食漢書武帝令天下五日婁注蔡邕曰貙勅俱切常以立秋日還食其母王者以此時祭廟婁劉劉殺也言擊殺之時又續漢禮儀志立秋郊畢始揚威武斬牲令郊東門名曰貙劉以此考之髙祖之言為是不可笑也藍田出玉世儒多以比物之潔白者按初學記藍田出美玉如藍故名藍田則藍田玉乃玉之青者不當比潔白又許慎説文瓊赤玉也詩人亦以比潔白如瓊花瓊枝之類雖退之亦以瓊瑰比雪葢古今沿習不可不深考也唐記多書慮囚本朝詔令亦多用往往讀為思慮之慮故雋不疑𫝊行縣録囚徒還顔師古注省録之知其情状有寃滯今之慮囚本録聲之去者音力俱反近俗不曉其意訛其文遂為思慮之慮失其源矣人姓名古今同者甚多且以近時論之唐有蔡京漢有王甫唐獨孤郎𫝊有鄭居中徐岱字處仁嘉興人于學無不通見本𫝊霍光𫝊宣紀廷尉光注李光韓文有劉正夫英宗時臺官有趙鼎王孫賈入市曰淖齒殺閔王欲與我誅者袒右市人從者四百人誅淖齒周勃誅吕用左袒之䇿本此北人以乳酪拌櫻桃食之摭言新進士重櫻桃宴劉覃及第櫻桃初出和以糖酪人享蠻畫一小盎不啻数升漢文欲任賈誼為公卿綘灌之屬皆害之毁誼曰洛陽之人年少初學専欲擅權紛亂諸事天子後亦踈之其後人告綘侯謀反繋長安獄誼専以㢘恥勵臣下為言以譏文帝誼不懐前怨而卒言待大臣無禮以感悟上此君子用心也及觀袁盎為文帝言絳侯功臣非社稷臣且言臣主失禮自是上益荘丞相益畏綘侯嘗以毁我責盎其後繫請室諸公莫敢為言惟盎明綘侯無罪綘侯得釋盎無言其言正故前不阿絳侯後不遂非誼不懐前怨盎不遂前非皆勃之幸也爛柯多用棋事聴琴亦然水經晋民王質伐木入信安縣室坂見童子四人鼓琴質倚柯聴之既去爛柯去家已数十年曲江周府君碑府君後漢人碑隂載門吏皆云曲紅古字簡多借用故以紅為江酈元不暁其義載曲江縣乃云昔號曲紅又云曲山名以地勢攷之武谿自北来自西入海古郡城在其上眎江水正曲何名為山哉春秋穀洛鬬以為災異水經載韋昭云洛在王城南穀在北周靈王時穀水盛出王城西南流洽於洛兩水相格有似於鬭以此觀之凡州郡有兩水者皆如此亦常事也嶺外人家嬰兒衣暮則急收不可露夜土人云有蟲名暗衣見小兒衣必飛毛著其上兒必病寒熱久則瘦不可療其形如大蝴蝶又水經豫章逕陽縣多女鳥元中記曰新陽男子於水際得之與共居生二女悉衣羽而去豫章間養兒不露其衣言是鳥落塵於兒衣中令兒病亦謂之夜飛游女由此觀之乃暗衣也𨽻書古今皆云程邈變篆為之水經注王次仲變蒼頡舊文為今𨽻書始皇以次仲所易字簡便於事三召不至次仲履真懐道窮術数之美則變𨽻不自程邈始自王次仲始也𨽻始於秦然水經載臨淮人發古塜得銅棺為𨽻字言齊太公世孫胡公之棺惟三字是古𨽻又知𨽻非始於秦也袁盎之兄子種謂盎曰絲能日飲無何是姪字叔也晁錯父謂錯曰公為政用事侵削諸侯䟽人骨肉公何為也又曰吾去公歸矣是父公其子也斬首幾級謂斬敵一首拜爵一級謂一首為一級見衛青𫝊注今云取其人首級非也雕印文字唐以前無之唐宋益州始有墨板後唐方鏤九經悉收人間所蔵經史以􅍢板為正見兩朝國史物去其勢豕曰豶見易牛曰犗見佛書馬曰扇見五代史雞曰敦犬曰閹見俗語錢有字漫見漢西域𫝊􅄢賔國以金銀為錢文為騎馬幕為人面張晏注錢文面作騎馬形漫面作人面目如淳曰幕音漫師古曰幕即漫耳琉璃西域注云師古曰大秦國出赤白黑青黄緑縹紺紅紫十種此自然之物采澤光明踰於衆玉今俗所用皆消石汁加以衆藥灌而為之大虚脆不貞實非真物從官知州陞監司止押檢乃祥符五年詔知制誥觀察使以上知州上書押檢見三朝國史厯書七十二候惟桃桐菊言華至菊又言黄華桃以候婚姻桐以待鳯盛於二三月得陽之盛菊非得霜不盛開於九月十月得隂之盛然則其他皆不可言華菊以黄為正東坡亦載朱勃之言士大夫學佛不殺生固善事然其胷次所存鑄筆成金一念之間殺人無数至於政事喜怒有絶㓕人門戸者乃區區為一螺蚌蜆蛤不肯庖宰而曰畏殺生云者吾不知也三代以来周公孔子行事何嘗勸人殺物命哉但不暴殄天物窮極滋味而已祭祀賔客之資甘㫖供養之奉有不可畧者未嘗以戒殺生故絶也孟子最明此牛羊何擇聞聲不忍食其肉之類盡之矣三命家言支干者見白虎通甲乙幹也子丑支也不當言干當言幹也夏正以平旦為朔商以雞鳴為朔周以夜半為朔亦見白虎通漢云夜半朔旦冬至者用周厯也三命家行小運男起丙寅女起壬申其説往往穿鑿許慎説文包字象人懐妊已在中象子未成形元氣起於子子人所生也男左行三十女右行二十俱立於己為夫婦懐妊于己巳為子十月而生男起己至寅女起巳至申故男年始寅女年始申小運起寅申葢本於此亦三隂三陽之位也男必丙寅以丙禄在己女必壬申以壬禄在亥寅申己亥之位亦水火之盛也李徳裕窮愁志周秦行紀論謂牛僧孺身與帝王妃后􅁳遇証其身非人臣相懐異志於圖䜟云云所恨未暇族之若不在當代必在子孫湏以太牢少長咸寘於法牛李之黨如宗閔之徒則小人也僧孺無大過惡而徳裕恨之如此之深亦過矣至欲㓕其族則徳裕乃忍人也僧孺豈能為簒逆身死之後子孫豈有反者信圗䜟而妄加人以㓕族之罪恐天地不容鬼神不赦卒死朱崖未必非報也開元中御史周子諒言牛仙客亦以姓符圗䜟子諒杖死於朝堂亦報也仙客不可為宰相是已加以名應圗䜟之罪則妄也䜟云首尾三鱗六十年兩角犢子自狂顛龍蛇相鬭血成川謂之自狂顛言不能成事何足畏也終唐之世無牛姓為盗者䜟又何足信哉漢食貨志金三品黄金為上白金為中赤金為下孟康注曰白金銀也赤金銅也故天下皆曰白金為銀其後曰造銀錫白金既造銀又造白金則白金疑非銀也恐是金之白者赤金亦金之赤者耳金三等以色之淺深為别漢武紀收銀錫造白金則銀與白金昭然為二物漢文時日蝕以為丞相周勃所致退勃使就國宣帝時日蝕以為楊惲書所致遂殺惲成帝時日蝕以為相王商所致罷商遂為母子如初見左𫝊遂為父子如初見鄒陽𫝊注漢有甲令乙令甲令見吳芮賛著甲令以稱忠乙令見張釋之𫝊注四至九卿司馬安見汲黯𫝊許商詳見周堪𫝊今婦人削去眉畫以墨葢古法也釋名曰黛代也㓕去眉毛以代其處也大曲新水歌樂昌公主與徐徳言破鏡復合事為中元日事本事詩云他日必以正月望日賣於都市後果如其言乃上元非中元也周禮卿執羔注云羔羣而不失其類介甫云羣而不黨致恭以有禮春秋繁露云凡贄卿執羔羔飲於其母必跪而乳類有禮者介甫前説本於注而小不同不失其類與不黨則有間矣後説則全用繁露也魯直詩多用居然字晋宋間語也范堅云居然許宗之請庾敳云䖏衆人中居然獨立后稷詩云居然生子此其本也猗覺寮雜記卷下
